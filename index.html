<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>생산공정 관리 v21</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;height:100vh;height:100dvh;overflow:hidden;touch-action:manipulation;user-select:none;}
.screen{display:none;height:100vh;height:100dvh;flex-direction:column;}
.screen.active{display:flex;}
.hdr{color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr h1{font-size:22px;font-weight:700;}
.back{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;padding:8px 14px;border-radius:8px;cursor:pointer;}
.datebar{background:rgba(0,0,0,.15);color:rgba(255,255,255,.9);text-align:center;padding:7px;font-size:15px;flex-shrink:0;}
.scrollbody{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.home-group{display:flex;flex-direction:column;gap:10px;padding:8px 0;}
.home-row{display:grid;gap:10px;}
.home-row.r3{grid-template-columns:1fr 1fr 1fr;}
.home-row.r2{grid-template-columns:1fr 1fr;}
.dept-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border:none;border-radius:16px;padding:20px 10px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.08);min-height:100px;}
.dept-btn:active{transform:scale(.96);}
.dept-btn .ico{font-size:32px;margin-bottom:6px;}
.dept-btn .lbl{font-size:18px;font-weight:700;color:#111;}
.divline{height:1px;background:#e0e0e0;margin:2px 0;}
.pin-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;}
.pin-title{font-size:24px;font-weight:700;color:#111;}
.pin-sub{font-size:16px;color:#777;}
.pin-dots{display:flex;gap:14px;}
.pin-dot{width:20px;height:20px;border-radius:50%;border:3px solid #1565c0;background:transparent;}
.pin-dot.on{background:#1565c0;}
.npad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:340px;}
.nk{height:72px;font-size:26px;font-weight:600;background:#fff;border:2px solid #ddd;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.07);color:#111;}
.nk:active{background:#e3f2fd;}
.nk.del{color:#e53935;}
.nk.ok{background:#1565c0;color:#fff;border-color:#1565c0;}
.menu-btn{background:#fff;border:none;border-radius:14px;padding:18px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:0 3px 10px rgba(0,0,0,.07);text-align:left;width:100%;}
.menu-btn:active{background:#f5f5f5;}
.menu-btn .mico{font-size:30px;flex-shrink:0;}
.menu-btn .mtitle{font-size:20px;font-weight:700;color:#111;}
.menu-btn .mdesc{font-size:13px;color:#999;margin-top:3px;}
.row-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 3px 10px rgba(0,0,0,.07);cursor:pointer;border-left:5px solid #e0e0e0;}
.row-card:active{background:#f0f0f0;}
.row-title{font-size:20px;font-weight:700;color:#111;margin-bottom:4px;}
.row-sub{font-size:15px;font-weight:600;color:#555;margin-bottom:6px;}
.row-info{font-size:14px;color:#777;line-height:1.8;}
.row-arrow{font-size:24px;color:#ccc;float:right;margin-top:-4px;}
.inp-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 3px 10px rgba(0,0,0,.07);}
.inp-label{font-size:13px;color:#999;margin-bottom:5px;}
.inp-val{font-size:22px;font-weight:700;color:#111;}
.inp-row{display:flex;gap:10px;}
.inp-row .inp-card{flex:1;}
.inp-field{display:flex;align-items:center;justify-content:space-between;border:2.5px solid #1565c0;border-radius:10px;padding:10px 14px;cursor:pointer;}
.inp-field .fv{font-size:26px;font-weight:700;color:#1565c0;}
.inp-field .fu{font-size:15px;color:#999;}
.inp-field.grn{border-color:#2e7d32;}
.inp-field.grn .fv{color:#2e7d32;}
.save-btn{background:#1565c0;color:#fff;border:none;border-radius:14px;padding:18px;font-size:21px;font-weight:700;cursor:pointer;flex-shrink:0;margin:8px 16px calc(16px + env(safe-area-inset-bottom,0px));}
.save-btn:active{background:#0d47a1;}
.kp-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;}
.kp-bg.on{display:block;}
.kp-sheet{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;padding:18px;z-index:101;}
.kp-sheet.on{display:block;}
.kp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.kp-lbl{font-size:19px;font-weight:700;}
.kp-close{background:none;border:none;font-size:24px;color:#aaa;cursor:pointer;}
.kp-disp{font-size:38px;font-weight:700;color:#1565c0;text-align:right;border-bottom:3px solid #1565c0;padding:6px 4px;margin-bottom:14px;}
.kp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.kp-ok{grid-column:span 3;height:58px;margin-top:2px;}
.pin-ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;}
.pin-ovl.on{display:flex;}
.pin-box{background:#fff;border-radius:20px;padding:26px 20px;width:92%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.pin-box-t{font-size:20px;font-weight:700;color:#111;}
.pin-box-s{font-size:14px;color:#888;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:13px 22px;border-radius:28px;font-size:16px;z-index:300;display:none;max-width:90vw;text-align:center;}
.toast.on{display:block;}
.toast.ok{background:#2e7d32;}
.toast.err{background:#c62828;}
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.82);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading.on{display:flex;}
.spin{width:48px;height:48px;border:5px solid #e0e0e0;border-top-color:#1565c0;border-radius:50%;animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-lbl{font-size:18px;color:#1565c0;font-weight:600;}
.empty{text-align:center;padding:50px 20px;color:#bbb;}
.empty .eico{font-size:52px;margin-bottom:12px;}
.empty .etxt{font-size:18px;}
.lot-search{width:100%;font-size:18px;padding:12px 14px;border:2px solid #ddd;border-radius:12px;outline:none;background:#fff;color:#111;}
.lot-search:focus{border-color:#1565c0;}
.lot-card{background:#fff;border-radius:12px;padding:13px 14px;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;border-left:5px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;}
.lot-card.sel{border-left-color:#2e7d32;background:#e8f5e9;}
.lot-card .ln{font-size:17px;font-weight:700;color:#111;}
.lot-card .ls{font-size:12px;color:#888;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lot-card .lr{font-size:15px;font-weight:700;color:#1565c0;white-space:nowrap;text-align:right;}
.lot-card.sel .lr{color:#2e7d32;}
.basket{flex-shrink:0;background:#fff;border-top:1px solid #e0e0e0;padding:12px 16px;max-height:40vh;overflow-y:auto;box-shadow:0 -3px 10px rgba(0,0,0,.05);}
.basket .bt{font-size:14px;font-weight:700;color:#555;margin-bottom:6px;}
.bchip{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed #eee;font-size:15px;color:#111;}
.bchip .bx{color:#c62828;font-size:20px;cursor:pointer;padding:0 8px;}
.bsum{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-top:8px;color:#111;}
.bfield{display:flex;justify-content:space-between;align-items:center;border:2.5px solid #2e7d32;border-radius:10px;padding:11px 14px;margin-top:10px;cursor:pointer;}
.bfield .bfv{font-size:23px;font-weight:700;color:#2e7d32;}
.bcalc{font-size:14px;color:#666;margin-top:8px;text-align:right;}
.invbtn{flex-shrink:0;border:none;border-radius:9px;padding:9px 12px;font-size:14px;font-weight:700;cursor:pointer;}
.invbtn.cx{background:#fde8e8;color:#c62828;}
.invbtn.rs{background:#e8f1fd;color:#1565c0;}
.navtabs{display:flex;gap:8px;flex-shrink:0;padding:8px 16px 4px;}
.navtab{flex:1;border:2px solid #ddd;background:#fff;border-radius:12px;padding:20px 8px;font-size:18px;font-weight:700;color:#666;cursor:pointer;}
#inpTitle{flex:1;text-align:center;font-size:25px;}
.navtab.active{background:#1565c0;border-color:#1565c0;color:#fff;}
.navtab:active{transform:scale(.97);}
.lot-card.lock{opacity:.55;background:#fafafa;cursor:default;}
.lot-card.lock .ln{color:#888;}
</style>
</head>
<body>

<script type="module">
// ── Firebase SDK ──────────────────────────────────────────────
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp, writeBatch }
                                                   from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiqr0ooR2s1Sps0hq0F5K9F1GoFm-HEoQ",
  authDomain: "factory-process.firebaseapp.com",
  projectId: "factory-process",
  storageBucket: "factory-process.firebasestorage.app",
  messagingSenderId: "1059311200802",
  appId: "1:1059311200802:web:c4bf4f20210230f445f87b"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

const DEMO = false;

// ── Firestore 헬퍼 ────────────────────────────────────────────
// 공정 행 목록 읽기
async function fbGetRows(dept) {
  const colRef = collection(db, 'rows');
  const q = query(colRef, orderBy('date','desc'));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({rowNum: d.id, ...d.data()}));
}

// 부서 비밀번호 확인
async function fbVerifyDept(code, pw) {
  const ref = doc(db, 'depts', code);
  const snap = await getDoc(ref);
  if (!snap.exists()) return {success:false};
  return snap.data().pw === pw ? {success:true} : {success:false};
}

// 작업자 PIN 확인
async function fbVerifyEmp(pin, dept) {
  const q = query(collection(db,'employees'), where('pin','==',pin), where('dept','==',dept));
  const snap = await getDocs(q);
  if (snap.empty) return {success:false};
  const d = snap.docs[0].data();
  return {success:true, name:d.name};
}

// 선재 후중량 저장 (단건)
async function fbSaveWire(rowNum, weight, empName) {
  const ref = doc(db, 'rows', String(rowNum));
  await updateDoc(ref, {wireReal: weight, wireEmp: empName, wireTs: serverTimestamp()});
  return {success:true};
}

// 선재 후중량 저장 (복수)
async function fbSaveWires(items, empName) {
  const batch = writeBatch(db);
  items.forEach(it => {
    const ref = doc(db, 'rows', String(it.rowNum));
    batch.update(ref, {wireReal: it.weight, wireEmp: empName, wireTs: serverTimestamp()});
  });
  await batch.commit();
  // 선재 로트 생성
  for (const it of items) {
    const rowSnap = await getDoc(doc(db,'rows',String(it.rowNum)));
    const row = rowSnap.data() || {};
    const lotNo = it.rowNum + '-W';
    await setDoc(doc(db,'wireLots', lotNo), {
      no: lotNo, meltNo: row.meltNo||'', rowNum: it.rowNum,
      wtype: row.wireType||'', cont: row.content||'', mat: row.material||'',
      left: it.weight, chainType: row.chainType||'', chainLen: row.chainLen||'', chainWt: row.chainWt||0,
      status: '검수대기', claimed: it.weight, emp: empName, ts: serverTimestamp()
    }, {merge:true});
  }
  return {success:true};
}

// 입고확인 대기 선재 로트
async function fbGetPendingWires() {
  const q = query(collection(db,'wireLots'), where('status','in',['검수대기','불일치']));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({...d.data()}));
}

// 입고확인 대기 체인 로트
async function fbGetPendingChains() {
  const q = query(collection(db,'chainLots'), where('status','in',['검수대기','불일치']));
  const snap = await getDocs(q);
  return snap.docs.map(d => ({...d.data()}));
}

// 선재 입고확인 저장
async function fbConfirmWires(items, empName) {
  let ok=0, bad=0;
  for (const it of items) {
    const ref = doc(db,'wireLots', it.no);
    const snap = await getDoc(ref);
    const claimed = snap.exists() ? (snap.data().claimed||0) : 0;
    const diff = Math.abs(it.checkWeight - claimed);
    const status = (claimed>0 && diff > claimed*0.05) ? '불일치' : '사용가능';
    await updateDoc(ref, {status, checkWeight: it.checkWeight, checkEmp: empName, checkTs: serverTimestamp()});
    if (status==='사용가능') ok++; else bad++;
  }
  return {success:true, ok, bad};
}

// 체인 입고확인 저장
async function fbConfirmChains(items, empName) {
  let ok=0, bad=0;
  for (const it of items) {
    const ref = doc(db,'chainLots', it.no);
    const snap = await getDoc(ref);
    const claimed = snap.exists() ? (snap.data().claimed||0) : 0;
    const diff = Math.abs(it.checkWeight - claimed);
    const status = (claimed>0 && diff > claimed*0.05) ? '불일치' : '사용가능';
    await updateDoc(ref, {status, checkWeight: it.checkWeight, checkEmp: empName, checkTs: serverTimestamp()});
    if (status==='사용가능') ok++; else bad++;
  }
  return {success:true, ok, bad};
}

// 사용 가능 선재 로트 (기계실 체인생산용)
async function fbGetWireLots() {
  const q = query(collection(db,'wireLots'), where('status','==','사용가능'));
  const snap = await getDocs(q);
  return snap.docs.map(d => d.data());
}

// 사용 가능 체인 로트 (용접실용)
async function fbGetChainLots() {
  const q = query(collection(db,'chainLots'), where('status','==','사용가능'));
  const snap = await getDocs(q);
  return snap.docs.map(d => d.data());
}

// 체인 생산중량 일괄 저장
async function fbSaveChainsBatch(items, empName) {
  let made=0, haeriSum=0;
  for (const it of items) {
    const wRef = doc(db,'wireLots', it.no);
    const wSnap = await getDoc(wRef);
    const wire = wSnap.data()||{};
    const haeri = (wire.left||0) - it.weight;
    haeriSum += haeri;
    // 선재 로트 상태 업데이트
    await updateDoc(wRef, {status:'사용됨', chainProd: it.weight, haeri, prodEmp: empName, prodTs: serverTimestamp()});
    // 체인 로트 생성
    const chainNo = it.no + '-C';
    await setDoc(doc(db,'chainLots', chainNo), {
      no: chainNo, wireNo: it.no, meltNo: wire.meltNo||'',
      chainType: wire.chainType||'', left: it.weight, haeri,
      status: '검수대기', claimed: it.weight, emp: empName, ts: serverTimestamp()
    }, {merge:true});
    // rows 업데이트
    if (wire.rowNum) {
      await updateDoc(doc(db,'rows',String(wire.rowNum)), {chainProd: it.weight, haeri, chainEmp: empName, chainTs: serverTimestamp()});
    }
    made++;
  }
  return {success:true, made, haeriSum};
}

// 용접 후중량 일괄 저장
async function fbSaveWeldsBatch(items, empName) {
  let made=0, incSum=0;
  for (const it of items) {
    const cRef = doc(db,'chainLots', it.no);
    const cSnap = await getDoc(cRef);
    const chain = cSnap.data()||{};
    const inc = it.weight - (chain.left||0);
    incSum += inc;
    await updateDoc(cRef, {status:'사용됨', weldAfter: it.weight, inc, weldEmp: empName, weldTs: serverTimestamp()});
    // 용접 이력 기록
    const weldNo = it.no + '-Z';
    await setDoc(doc(db,'welds', weldNo), {
      no: weldNo, chainNo: it.no, meltNo: chain.meltNo||'',
      weld: it.weight, inc, emp: empName, ts: serverTimestamp()
    }, {merge:true});
    made++;
  }
  return {success:true, made, incSum};
}

// 재고 현황
async function fbGetInventory() {
  const [wSnap, cSnap, zSnap] = await Promise.all([
    getDocs(collection(db,'wireLots')),
    getDocs(collection(db,'chainLots')),
    getDocs(collection(db,'welds'))
  ]);
  return {
    wires:  wSnap.docs.map(d=>({...d.data(), no:d.id})),
    chains: cSnap.docs.map(d=>({...d.data(), no:d.id, ctype:d.data().chainType})),
    welds:  zSnap.docs.map(d=>d.data())
  };
}

// 로트 취소/복구
async function fbCancelLot(kind, no, restore) {
  const colName = kind==='wire' ? 'wireLots' : 'chainLots';
  await updateDoc(doc(db, colName, no), {status: restore ? '사용가능' : '취소'});
  return {success:true};
}

// 관리부 행 등록 (새 공정 투입)
async function fbAddRow(rowData) {
  const ref = doc(collection(db,'rows'));
  await setDoc(ref, {...rowData, ts: serverTimestamp()});
  return {success:true, id: ref.id};
}

// ── 기존 apiGet/apiPost를 Firebase로 교체 ─────────────────────
window._fbApi = {
  fbGetRows, fbVerifyDept, fbVerifyEmp,
  fbSaveWire, fbSaveWires,
  fbGetPendingWires, fbGetPendingChains,
  fbConfirmWires, fbConfirmChains,
  fbGetWireLots, fbGetChainLots,
  fbSaveChainsBatch, fbSaveWeldsBatch,
  fbGetInventory, fbCancelLot, fbAddRow
};
window._db = db;
window._fbReady = true;
window._fbFirestore = { getDocs, collection, doc, setDoc, updateDoc, addDoc, deleteDoc };
document.dispatchEvent(new Event('fbReady'));

<script>
var DEMO = false;
var G_WIRE_ROWS = {}; // rowNum -> row data for KP access
var S = {
  dept:null, deptName:null, deptColor:'#1565c0',
  user:null, loginPin:'', personalPin:'', personalCB:null,
  rows:[], selRow:null, inpMode:null,
  kpField:'', kpVal:'', fields:{}
};

function fmt(n) {
  var num = parseFloat(n) || 0;
  var parts = num.toFixed(0).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}

function initApp() {
  setDateBars();
  buildNpad('loginNpad', loginKey);
  buildNpad('pinNpad', pinKey);
  buildKpGrid();
  var _ls = document.getElementById('lotSearch'); if (_ls) _ls.addEventListener('input', renderLotAvail);
  var _lr = document.getElementById('lotRefresh'); if (_lr) _lr.onclick = function() { reloadLots(false); };
  setInterval(function() {
    if (document.getElementById('kpSheet').classList.contains('on')) return;
    if (document.getElementById('pinOvl').classList.contains('on')) return;
    var lot = document.getElementById('lotSc');
    if (lot && lot.classList.contains('active')) { reloadLots(true); return; }
    var inp = document.getElementById('inpSc');
    if (inp && inp.classList.contains('active') && S.screenMode === 'check') { pollCheck(); }
  }, 12000);
}

// Firebase 준비 완료 후 앱 초기화
if (window._fbReady) {
  initApp();
} else {
  document.addEventListener('fbReady', initApp);
}

function setDateBars() {
  var d = new Date();
  var days = ['일','월','화','수','목','금','토'];
  var s = d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 ' + days[d.getDay()] + '요일';
  document.getElementById('homeDateBar').textContent = s;
  document.getElementById('menuDateBar').textContent = s;
}

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}
function goHome() { S.loginPin = ''; show('home'); }
function goMenu() { show('menuSc'); }

function login(code, name, color) {
  S.dept = code; S.deptName = name; S.deptColor = color; S.loginPin = '';
  document.getElementById('loginName').textContent = name;
  document.getElementById('loginHdr').style.background = color;
  renderDots('loginDots', 0);
  show('loginSc');
}

function loginKey(k) {
  if (k === 'del') { S.loginPin = S.loginPin.slice(0,-1); renderDots('loginDots', S.loginPin.length); }
  else if (k === 'ok') { doLoginVerify(); }
  else if (S.loginPin.length < 6) {
    S.loginPin += k; renderDots('loginDots', S.loginPin.length);
    if (S.loginPin.length === 4) setTimeout(doLoginVerify, 200);
  }
}

async function doLoginVerify() {
  if (!S.loginPin.length) return;
  showLoad();
  var ok = false;
  if (DEMO) {
    await sleep(400);
    var pw = {MGMT:'0000',MATERIAL:'1111',MACHINE:'2222',WELD:'3333',QUALITY:'4444',GARANG:'5555',ASSEMBLY:'6666',OUTSOURCE:'7777'};
    ok = pw[S.dept] === S.loginPin;
  } else {
    try { var r = await apiGet('verifyDept', {code:S.dept, pw:S.loginPin}); ok = r.success; }
    catch(e) { hideLoad(); toast('❌ 연결 오류', 2000, 'err'); return; }
  }
  hideLoad();
  if (ok) { S.loginPin = ''; enterDept(); }
  else { toast('❌ 비밀번호가 틀렸습니다', 2000, 'err'); S.loginPin = ''; renderDots('loginDots', 0); }
}

function enterDept() {
  if (S.dept === 'MATERIAL') openList('wire');       // 자재실 → 용해 목록 바로
  else if (S.dept === 'MACHINE') openWireCheck();    // 기계실 → 입고확인 먼저 (체인생산 버튼 제공)
  else if (S.dept === 'WELD') openChainCheck();        // 용접실 → 체인 입고확인 먼저
  else if (S.dept === 'MGMT') openMenu();             // 관리부 → 메뉴
  else openMenu();                                    // 그 외 부서는 메뉴 유지
}

function openMenu() {
  document.getElementById('menuName').textContent = S.deptName;
  document.getElementById('menuHdr').style.background = S.deptColor;
  var body = document.getElementById('menuBody');
  body.innerHTML = '';
  var items = {
    MATERIAL: [{ico:'🔥', title:'용해 등록', desc:'선재 후중량 입력', action:function(){openList('wire');}}],
    MACHINE:  [{ico:'📥', title:'선재 입고확인', desc:'받은 무게 확인 → 활성화', action:function(){openWireCheck();}},
               {ico:'⛓️', title:'체인 생산', desc:'선재 투입 → 체인 생산', action:function(){openChainProd();}}],
    WELD:     [{ico:'✅', title:'용접 작업', desc:'체인 투입 → 용접 후 중량', action:function(){openWeldProd();}}],
    MGMT:     [
      {ico:'📊', title:'재고·생산현황', desc:'선재/체인 재고 · 용접 이력', action:function(){openInventory();}},
      {ico:'📋', title:'작업지시 등록', desc:'새 용해 · 공정 투입', action:function(){openOrderInput();}},
      {ico:'⚙️', title:'초기 세팅', desc:'부서 비밀번호 · 작업자 관리', action:function(){openSetup();}}
    ],
    OUTSOURCE:[{ico:'🚚', title:'외주 작업', desc:'준비 중', action:function(){toast('준비 중',2000);}}],
    GARANG:   [{ico:'🪢', title:'가랑 작업', desc:'준비 중', action:function(){toast('준비 중',2000);}}],
    ASSEMBLY: [{ico:'🔗', title:'조립 작업', desc:'준비 중', action:function(){toast('준비 중',2000);}}],
    QUALITY:  [{ico:'🔍', title:'품질 검사', desc:'준비 중', action:function(){toast('준비 중',2000);}}],
  };
  (items[S.dept] || []).forEach(function(item) {
    var btn = document.createElement('button');
    btn.className = 'menu-btn';
    btn.innerHTML = '<div class="mico">' + item.ico + '</div><div><div class="mtitle">' + item.title + '</div><div class="mdesc">' + item.desc + '</div></div>';
    btn.onclick = item.action;
    body.appendChild(btn);
  });
  show('menuSc');
}

async function openList(mode) {
  S.inpMode = mode;
  var titles = {wire:'용해 등록 목록', chain:'체인 생산 목록', weld:'용접 목록', view:'오늘 생산현황'};
  document.getElementById('listTitle').textContent = titles[mode] || '목록';
  document.getElementById('listHdr').style.background = S.deptColor;
  var _lkb = document.getElementById('listBack'); _lkb.onclick = goHome; _lkb.textContent = '← 홈';
  showLoad();

  if (DEMO) { await sleep(400); S.rows = demoRows(); }
  else {
    try { var r = await apiGet('getRows', {dept:S.dept}); S.rows = r.data || []; }
    catch(e) { S.rows = demoRows(); }
  }
  hideLoad();

  var filtered = S.rows.filter(function(r) {
    if (mode === 'wire')  return !r.wireReal;
    if (mode === 'chain') return r.wireReal && !r.chainProd;
    if (mode === 'weld')  return r.chainProd && !r.weldAfter;
    return true;
  });

  var body = document.getElementById('listBody');
  body.innerHTML = '';
  if (!filtered.length) {
    body.innerHTML = '<div class="empty"><div class="eico">📭</div><div class="etxt">현재 입력할 항목이 없습니다</div></div>';
    show('listSc'); return;
  }

  if (mode === 'wire') {
    // 용해번호별 묶음 — 남은(미완성) 선재만 카드로, 진행현황은 전체 기준
    var groups = {};
    var groupOrder = [];
    filtered.forEach(function(row) {
      if (!groups[row.meltNo]) { groups[row.meltNo] = []; groupOrder.push(row.meltNo); }
      groups[row.meltNo].push(row);
    });
    groupOrder.forEach(function(meltNo) {
      var remainRows = groups[meltNo];
      var allRows = S.rows.filter(function(r) { return r.meltNo === meltNo; });
      var total = allRows.length;
      var doneRows = allRows.filter(function(r) { return r.wireReal; });
      var done = doneRows.length;
      var remain = total - done;
      var first = remainRows[0];

      // 선재종류 · 예상중량 · 후중량 한 줄, 연한 실선 구분
      var headHtml =
        '<div style="display:flex;gap:14px;padding:3px 0 5px;font-size:11px;color:#aaa;font-weight:600">' +
          '<span style="flex:0 0 96px">선재종류</span>' +
          '<span style="flex:0 0 70px;text-align:right">예상중량</span>' +
          '<span style="flex:0 0 70px;text-align:right">후중량</span>' +
        '</div>';
      var rowsHtml = allRows.map(function(r) {
        var doneRow = !!r.wireReal;
        var realTxt = doneRow
          ? '<span style="color:#2e7d32;font-weight:700">' + fmt(r.wireReal) + 'g</span>'
          : '<span style="color:#cfcfcf">—</span>';
        var nameTxt = (doneRow ? '✅ ' : '') + (r.wireType||'-');
        return '<div style="display:flex;gap:14px;align-items:baseline;padding:7px 0;border-bottom:1px solid #f1f1f1' + (doneRow ? ';opacity:.6' : '') + '">' +
            '<span style="flex:0 0 96px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + nameTxt + '</span>' +
            '<span style="flex:0 0 70px;text-align:right;color:#1565c0;font-weight:700">' + fmt(r.wirePlan) + 'g</span>' +
            '<span style="flex:0 0 70px;text-align:right">' + realTxt + '</span>' +
          '</div>';
      }).join('');

      var card = document.createElement('div');
      card.className = 'row-card';
      card.style.borderLeftColor = S.deptColor;
      card.innerHTML =
        '<span class="row-arrow">›</span>' +
        '<div class="row-title">' + meltNo + '</div>' +
        '<div class="row-sub">' + (first.material||'') + ' ' + (first.content||'-') + '%</div>' +
        '<div style="font-size:13px;margin:4px 0 6px">총 <b>' + total + '</b>종 &nbsp;·&nbsp; <span style="color:#2e7d32">완성 <b>' + done + '</b></span> &nbsp;·&nbsp; <span style="color:#1565c0">남음 <b>' + remain + '</b></span></div>' +
        headHtml + rowsHtml;
      card.onclick = function() { openWireGroupInp(meltNo, remainRows); };
      body.appendChild(card);
    });
  } else {
    filtered.forEach(function(row) {
      var card = document.createElement('div');
      card.className = 'row-card';
      card.style.borderLeftColor = S.deptColor;
      card.innerHTML = buildCard(row, mode);
      if (mode !== 'view') {
        card.onclick = function() { S.selRow = row; openInp(mode, row); };
      }
      body.appendChild(card);
    });
  }
  show('listSc');
}

function buildCard(r, mode) {
  if (mode === 'wire') {
    return '<span class="row-arrow">›</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.wireType||'-') + ' &nbsp;|&nbsp; ' + (r.material||'') + ' ' + (r.content||'-') + '%</div>' +
      '<div class="row-info">' +
        '순은 <b>' + fmt(r.silver) + 'g</b>&nbsp; 알로이 <b>' + fmt(r.alloy) + 'g</b>&nbsp; 연주로 <b>' + fmt(r.furnace) + 'g</b><br>' +
        '재말수령 <b>' + fmt(r.scrapRecv) + 'g</b>&nbsp; 재말투입 <b>' + fmt(r.scrapUse) + 'g</b>&nbsp; 재말잔량 <b>' + fmt(r.scrapLeft) + 'g</b><br>' +
        '불량선재 <b>' + fmt(r.badWire) + 'g</b>&nbsp; 예상중량 <b style="color:#1565c0">' + fmt(r.wirePlan) + 'g</b>' +
      '</div>';
  }
  if (mode === 'chain') {
    return '<span class="row-arrow">›</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.chainType||'-') + ' &nbsp;|&nbsp; ' + (r.wireType||'-') + '</div>' +
      '<div class="row-info">' +
        '선재후중량 <b style="color:#2e7d32">' + fmt(r.wireReal) + 'g</b>&nbsp; 계획 <b>' + fmt(r.chainPlan) + 'g</b>' +
      '</div>';
  }
  if (mode === 'weld') {
    return '<span class="row-arrow">›</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.chainType||'-') + '</div>' +
      '<div class="row-info">' +
        '체인생산 <b>' + fmt(r.chainProd) + 'g</b>&nbsp; 해리 <b style="color:#e53935">' + fmt(r.haeri) + 'g</b>' +
      '</div>';
  }
  var step = r.weldAfter ? '✅용접완료' : r.chainProd ? '⚙️기계완료' : r.wireReal ? '⚗️선재완료' : '📋대기';
  return '<div class="row-title">' + r.meltNo + ' — ' + (r.wireType||'') + '</div>' +
    '<div class="row-sub">' + (r.material||'') + ' ' + (r.content||'-') + '% &nbsp;|&nbsp; ' + step + '</div>' +
    '<div class="row-info">' +
      '선재 <b>' + fmt(r.wireReal) + 'g</b> → 체인 <b>' + fmt(r.chainProd) + 'g</b> → 해리 <b style="color:#e53935">' + fmt(r.haeri) + 'g</b> → 용접후 <b>' + fmt(r.weldAfter) + 'g</b>' +
    '</div>';
}


function openWireGroupInp(meltNo, rows) {
  S.inpMode = 'wire_group';
  S.screenMode = '';
  document.getElementById('saveBtn').style.display = '';
  var _in = document.getElementById('inpNav'); if (_in) _in.style.display = 'none';
  S.selRow = rows[0];
  S.fields = {wireWeights: {}};
  rows.forEach(function(r) { S.fields.wireWeights[r.rowNum] = 0; G_WIRE_ROWS[r.rowNum] = r; });

  document.getElementById('inpTitle').textContent = '선재 실중량 입력';
  document.getElementById('inpHdr').style.background = S.deptColor;
  document.getElementById('inpBack').onclick = function() { openList('wire'); };
  document.getElementById('inpBack').textContent = '← 뒤로';
  var _icb2 = document.getElementById('inpChainBtn'); if (_icb2) _icb2.style.display = 'none';

  var f = rows[0];
  var html =
    '<div class="inp-card"><div class="inp-label">용해번호</div><div class="inp-val" style="color:#1565c0">' + meltNo + '</div></div>' +
    '<div class="inp-row">' +
      '<div class="inp-card"><div class="inp-label">재질</div><div class="inp-val">' + (f.material||'-') + '</div></div>' +
      '<div class="inp-card"><div class="inp-label">함량</div><div class="inp-val">' + (f.content||'-') + '%</div></div>' +
    '</div>' +
    '<div class="inp-card" style="background:#e8f5e9">' +
      '<div class="inp-label">📋 투입 재료</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;font-size:13px">' +
        '<div>순은 <b>' + fmt(f.silver) + 'g</b></div>' +
        '<div>알로이 <b>' + fmt(f.alloy) + 'g</b></div>' +
        '<div>연주로 <b>' + fmt(f.furnace) + 'g</b></div>' +
        '<div>재말투입 <b>' + fmt(f.scrapUse) + 'g</b></div>' +
        '<div>재말잔량 <b>' + fmt(f.scrapLeft) + 'g</b></div>' +
        '<div>불량선재 <b>' + fmt(f.badWire) + 'g</b></div>' +
      '</div>' +
    '</div>';

  // 선재 목록을 하나의 카드 안에 2열로 배치
  html += '<div class="inp-card"><div class="inp-label" style="margin-bottom:10px">선재종류별 실중량 입력</div>';

    var fid = 'ww_' + row.rowNum;
    html +=
      '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;">' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-size:16px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (row.wireType||'-') + '</div>' +
          '<div style="font-size:12px;color:#888;margin-top:2px">예상 ' + fmt(row.wirePlan) + 'g</div>' +
        '</div>' +
        '<div class="inp-field grn" style="width:130px;flex-shrink:0;cursor:pointer" onclick="openKPWireByNum(' + row.rowNum + ')">' +
          '<span class="fv" id="' + fid + '">0</span>' +
          '<span class="fu" style="font-size:14px">g</span>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';

    return {rowNum: row.rowNum, weight: S.fields.wireWeights[row.rowNum] || 0};

    afterWireSave(meltNo); return;
  }
  try {
    var r = await apiPost({action:'saveWires', empName:emp, items:items});

}

function fmtKp(v) {
  var parts = (v || '0').split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}
function kpPress(k) {
  if (k === 'del') S.kpVal = S.kpVal.slice(0,-1);
  else if (k === '.') { if (!S.kpVal.includes('.')) S.kpVal += '.'; }
  else if (S.kpVal.length < 9) S.kpVal += k;
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
}
function openKP(field, label) {
  S.kpField = field; S.kpVal = S.fields[field] ? String(S.fields[field]) : '';
  document.getElementById('kpLbl').textContent = label;
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
  document.getElementById('kpBg').classList.add('on');
  document.getElementById('kpSheet').classList.add('on');
}
function hideKpSheet() {
  document.getElementById('kpBg').classList.remove('on');
  document.getElementById('kpSheet').classList.remove('on');
}
function cancelKP() { hideKpSheet(); }   // 값 반영 없이 닫기 — '✓확인'을 눌러야만 입력 반영
function closeKP() {
  var v = parseFloat(S.kpVal) || 0;
  if (S.kpField.indexOf('chk_') === 0) {            // 기계실 측정중량 → 필드에 표시
    var cno = S.kpField.slice(4);
    var px = S.pendMap[cno];
    var claimed = px ? (parseFloat(px.claimed) || 0) : 0;
    if (v > 0 && claimed > 0 && Math.abs(v - claimed) > claimed * 0.05) {
      hideKpSheet();
      var src = (S.checkKind === 'chain') ? '기계실' : '자재실';
      toast('🚫 ' + src + ' 신고 ' + fmt(claimed) + 'g · 측정 ' + fmt(v) + 'g — 5% 초과, 다시 측정하세요', 4200, 'err');
      return;
    }
    S.checkVals[cno] = v;
    var ce = document.getElementById('chk_' + cno);
    if (ce) ce.textContent = fmt(v);
    hideKpSheet();
    return;
  }
  if (S.kpField.indexOf('prod_') === 0) {           // 체인 생산중량/용접 후중량(필드 표시)
    var pno = S.kpField.slice(5);
    S.prodVals[pno] = v;
    var pce = document.getElementById('pv_' + pno);
    if (pce) pce.textContent = fmt(v);
    hideKpSheet();
    return;
  }
  if (S.kpField.indexOf('use_') === 0) {            // 로트 투입 사용량
    var no = S.kpField.slice(4);
    var lot = S.availMap[no];
    if (v <= 0) { delete S.basket[no]; }
    else { if (lot && v > lot.left) v = lot.left; S.basket[no] = {lot:lot, used:v}; }
    hideKpSheet(); renderLotAvail(); renderBasket(); return;
  }
  if (S.kpField === 'prodWeight') {                 // 체인생산/용접후중량
    S.fields.prodWeight = v; hideKpSheet(); renderBasket(); return;
  }
  if (S.kpField.indexOf('ww_') === 0) {
    var rowNum = parseInt(S.kpField.replace('ww_', ''));
    if (S.fields.wireWeights) S.fields.wireWeights[rowNum] = v;
    var el = document.getElementById(S.kpField);
    if (el) el.textContent = fmt(v);
  } else {
    S.fields[S.kpField] = v;
    var el2 = document.getElementById('v_' + S.kpField);
    if (el2) el2.textContent = fmt(v);
  }
  hideKpSheet();
}

async function apiGet(action, params) {
  var api = window._fbApi;
  if (action === 'getRows')          return { data: await api.fbGetRows(params.dept||'') };
  if (action === 'verifyDept')       return api.fbVerifyDept(params.code, params.pw);
  if (action === 'verifyEmp')        return api.fbVerifyEmp(params.pin, params.dept);
  if (action === 'getPendingWires')  return { data: await api.fbGetPendingWires() };
  if (action === 'getPendingChains') return { data: await api.fbGetPendingChains() };
  if (action === 'getWireLots')      return { data: await api.fbGetWireLots() };
  if (action === 'getChainLots')     return { data: await api.fbGetChainLots() };
  if (action === 'getInventory')     return api.fbGetInventory();
  throw new Error('Unknown action: ' + action);
}
async function apiPost(data) {
  var api = window._fbApi;
  var act = data.action;
  if (act === 'saveWire')        return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'saveWires')       return api.fbSaveWires(data.items, data.empName);
  if (act === 'saveChain')       return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'saveWeld')        return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'confirmWires')    return api.fbConfirmWires(data.items, data.empName);
  if (act === 'confirmChains')   return api.fbConfirmChains(data.items, data.empName);
  if (act === 'saveChainsBatch') return api.fbSaveChainsBatch(data.items, data.empName);
  if (act === 'saveWeldsBatch')  return api.fbSaveWeldsBatch(data.items, data.empName);
  if (act === 'cancelLot')       return api.fbCancelLot(data.kind, data.no, data.restore);
  throw new Error('Unknown action: ' + act);
}

function openCheckKP(no) {
  var x = S.pendMap[no]; if (!x) return;
  var size = (S.checkKind === 'chain') ? (x.chainType || '') : (x.wtype || '');
  S.kpField = 'chk_' + no;
  S.kpVal = S.checkVals[no] ? String(S.checkVals[no]) : '';
  document.getElementById('kpLbl').textContent = size + ' · ' + no + ' / 측정중량(g)';
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
  document.getElementById('kpBg').classList.add('on');

function submitChecks() {
  var items = [];
  Object.keys(S.checkVals).forEach(function(no) {
    if (S.checkVals[no] > 0) items.push({no:no, checkWeight:S.checkVals[no]});
  });
  if (!items.length) { toast('⚠️ 측정중량을 1개 이상 입력하세요', 2000, 'err'); return; }
  requirePin(function() { doSubmitChecks(items); });
}

async function doSubmitChecks(items) {
  showLoad();
  var emp = S.user ? S.user.name : '미확인';
  var kind = S.checkKind;
  if (DEMO) { await sleep(500); hideLoad(); toast('✅ ' + items.length + '건 확인 (데모)', 1800, 'ok'); loadCheck(kind); return; }
  try {
    var act = kind === 'chain' ? 'confirmChains' : 'confirmWires';
    var r = await apiPost({action:act, items:items, empName:emp});
    hideLoad();
    if (r.success) {
      var msg = '✅ 활성화 ' + r.ok + '건';
      if (r.bad > 0) msg += ' · ⚠️ 불일치 ' + r.bad + '건(재확인)';
      toast(msg, 3500, r.bad > 0 ? 'err' : 'ok');
      loadCheck(kind);
    } else toast('❌ ' + (r.error || '실패'), 2500, 'err');
  } catch(e) { hideLoad(); toast('❌ 연결 오류', 2500, 'err'); }
}

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<div style="font-size:19px;font-weight:700">작업자 추가</div>' +
      '<button onclick="closeAddRow()" style="background:none;border:none;font-size:24px;color:#aaa;cursor:pointer">✕</button>' +
    '</div>' +
    '<div style="display:flex;flex-direction:column;gap:12px">' +
      '<div><div style="font-size:13px;color:#999;margin-bottom:4px">이름</div>' +
        '<input id="emp_name" style="width:100%;font-size:18px;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none" placeholder="홍길동"></div>' +
      '<div><div style="font-size:13px;color:#999;margin-bottom:4px">4자리 PIN</div>' +
        '<input id="emp_pin" type="number" maxlength="4" style="width:100%;font-size:22px;font-weight:700;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none" placeholder="1234"></div>' +
      '<div><div style="font-size:13px;color:#999;margin-bottom:4px">소속 부서</div>' +
        '<select id="emp_dept" style="width:100%;font-size:18px;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none">' +
          deptList.map(function(d){ return '<option value="' + d + '">' + d + '</option>'; }).join('') +
        '</select></div>' +
      '<button onclick="saveNewEmp()" style="width:100%;padding:16px;background:#2e7d32;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer">✅ 등록</button>' +
    '</div></div>';
  document.getElementById('addRowBg').classList.add('on');
  s.style.display = 'block';
}

async function saveNewEmp() {
  var name = (document.getElementById('emp_name').value||'').trim();
  var pin  = (document.getElementById('emp_pin').value||'').trim();
  var dept = document.getElementById('emp_dept').value;
  if (!name || pin.length !== 4) { toast('⚠️ 이름과 4자리 PIN을 입력하세요', 2000, 'err'); return; }
  try {
    var { collection, addDoc } = window._fbFirestore || {};
    await addDoc(collection(window._db, 'employees'), {name, pin, dept});
    closeAddRow();
    toast('✅ ' + name + ' 등록 완료', 1500, 'ok');
    loadSetupData();
  } catch(e) { toast('❌ 등록 실패: ' + e.message, 2500, 'err'); }
}

async function deleteEmp(id) {
  try {
    var { doc, deleteDoc } = window._fbFirestore || {};
    await deleteDoc(doc(window._db, 'employees', id));
    toast('🗑 삭제됨', 1200, 'ok');
    loadSetupData();
  } catch(e) { toast('❌ 삭제 실패', 2000, 'err'); }
}

</script>
</body>
</html>
