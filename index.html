<script type="module">
// ── Firebase SDK ──────────────────────────────────────────────
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp, writeBatch }
                                                   from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiqr0ooR2s1Sps0hq0F5K9F1GoFm-HEoQ",
  authDomain: "factory-process.firebaseapp.com",
  projectId: "factory-process",
  storageBucket: "factory-process.firebasestorage.app",
  messagingSenderId: "1059311200802",
  appId: "1:1059311200802:web:c4bf4f20210230f445f87b"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

const DEMO = false;

// ── Firestore 헬퍼 ────────────────────────────────────────────
// 공정 행 목록 읽기
async function fbGetRows(dept) {
  const colRef = collection(db, 'rows');
  // 전체 조회 후 앱에서 필터 (wireReal 필드 없는 문서도 포함하기 위해)
  const snap = await getDocs(colRef);
  const rows = snap.docs.map(d => {
    const data = d.data();
    const idRowNum = parseInt(d.id.replace('row_', '')) || 0;
    return { ...data, rowNum: idRowNum, docId: d.id };
  });
  rows.sort(function(a, b) { return (b.date||'').localeCompare(a.date||''); });
  return rows;
}

// 부서 비밀번호 확인
async function fbVerifyDept(code, pw) {
  const ref = doc(db, 'depts', code);
  const snap = await getDoc(ref);
  if (!snap.exists()) return {success:false};
  const data = snap.data();
  const stored = String(data.PW || data.pw || '');
  return stored === String(pw) ? {success:true} : {success:false};
}

// 작업자 PIN 확인 (부서 일치 여부도 검증)
async function fbVerifyEmp(pin, dept) {
  const snap = await getDocs(collection(db,'employees'));
  const pinStr = String(pin);
  for (const d of snap.docs) {
    const emp = d.data();
    if (String(emp.pin) === pinStr) {
      // 부서가 일치하거나 직원에 부서 정보가 없으면 통과
      if (!dept || !emp.dept || emp.dept === dept) {
        return {success:true, name:emp.name};
      } else {
        return {success:false, error:'이 부서의 작업자가 아닙니다'};
      }
    }
  }
  return {success:false};
}


// ── 긴급전달 / 분할전달 ──────────────────────────────────────
// 후중량 입력 전/후 모두 가능. row 정보 기반으로 전달 로트 생성
// dest: 'MACHINE'(기계실, 기본) 또는 'OUTSOURCE'(외주)
async function fbUrgentTransfer(row, sendWeight, empName, dest) {
  const rowNum = row.rowNum;
  const origNo = String(rowNum) + '-W';
  const isOut = (dest === 'OUTSOURCE');

  // 전달 횟수 계산 (기존 -P 로트 개수)
  const allSnap = await getDocs(collection(db, 'wireLots'));
  const existingP = allSnap.docs.filter(d => d.id.startsWith(origNo + '-P')).length;
  const partNo = origNo + '-P' + (existingP + 1);
  const seq = existingP + 1;

  // 전달 로트 생성: 기계실 → 검수대기 / 외주 → 외주출고
  await setDoc(doc(db, 'wireLots', partNo), {
    no: partNo, parentNo: origNo, seq: seq,
    meltNo: row.meltNo||'', rowNum: rowNum,
    wtype: row.wireType||'', cont: row.content||'', mat: row.material||'',
    left: sendWeight, claimed: sendWeight,
    chainType: row.chainType||'', chainLen: row.chainLen||'', chainWt: row.chainWt||0,
    status: isOut ? '외주출고' : '검수대기', isUrgent: true, isOutsource: isOut,
    emp: empName, ts: serverTimestamp()
  });

  // 원본 wireLot 있으면 잔량 차감, 없으면 스킵 (후중량 미입력 상태)
  const origRef = doc(db, 'wireLots', origNo);
  const origSnap = await getDoc(origRef);
  if (origSnap.exists()) {
    const newLeft = Math.max(0, (origSnap.data().left || 0) - sendWeight);
    await updateDoc(origRef, { left: newLeft });
  }

  return { success: true, partNo, seq, sendWeight };
}

// 선재 후중량 저장 (단건)
async function fbSaveWire(rowNum, weight, empName) {
  const ref = doc(db, 'rows', 'row_' + rowNum);
  await updateDoc(ref, {wireReal: weight, wireEmp: empName, wireTs: serverTimestamp()});

}

// 선재 후중량 저장 (복수)
async function fbSaveWires(items, empName) {
  const batch = writeBatch(db);
  items.forEach(it => {
    const ref = doc(db, 'rows', 'row_' + it.rowNum);
    batch.update(ref, {wireReal: it.weight, wireEmp: empName, wireTs: serverTimestamp()});
  });
  await batch.commit();
  // 기존 긴급전달(-P)로 이미 나간 분 합계 (중복 방지)
  const allLots = await getDocs(collection(db,'wireLots'));
  const sentMap = {};
  allLots.docs.forEach(d => {
    const data = d.data();
    if (data.parentNo && data.isUrgent) {
      sentMap[data.parentNo] = (sentMap[data.parentNo]||0) + (data.claimed||0);
    }
  });
  // 선재 로트 생성 (items에 row 데이터 포함, 긴급전달분 차감)
  for (const it of items) {
    const lotNo = String(it.rowNum) + '-W';
    const sent = sentMap[lotNo] || 0;
    const remainW = Math.max(0, it.weight - sent);
    await setDoc(doc(db,'wireLots', lotNo), {
      no: lotNo,
      meltNo: it.meltNo||'',
      rowNum: it.rowNum,
      wtype: it.wireType||'',
      cont: it.content||'',
      mat: it.material||'',
      left: remainW,
      sentBefore: sent,
      chainType: it.chainType||'',
      chainLen: it.chainLen||'',
      chainWt: it.chainWt||0,
      status: remainW > 0 ? '검수대기' : '사용됨',
      claimed: remainW,
      emp: empName,
      ts: serverTimestamp()
    }, {merge:true});
  }
  // 백그라운드로 구글 시트에도 반영 (getDoc 제거 - items에 이미 row 데이터 포함)
  items.forEach(it => {
    const lotNo3 = String(it.rowNum) + '-W';
    const sent3 = sentMap[lotNo3] || 0;
    const remainW3 = Math.max(0, it.weight - sent3);
    syncToSheet('updateWireReal', {
      rowNum: it.rowNum, meltNo: it.meltNo||'', wireType: it.wireType||'',
      wireReal: it.weight, emp: empName
    });
    syncToSheet('updateWireLot', {
      no: lotNo3, meltNo: it.meltNo||'', wtype: it.wireType||'',
      mat: it.material||'', cont: it.content||'',
      left: remainW3, chainType: it.chainType||'',
      chainLen: it.chainLen||'', chainWt: it.chainWt||0,
      status: remainW3 > 0 ? '검수대기' : '사용됨', rowNum: it.rowNum, emp: empName
    });
  });
  return {success:true};
}

// 선재 입고확인 저장
async function fbConfirmWires(items, empName) {

// 체인 부분전달 (기계실 → 용접실, 생산 중 일부 먼저 보내기)
async function fbChainUrgentTransfer(lot, sendWeight, sendLen, empName) {
  const parentNo = lot.no + '-C';
  const allSnap = await getDocs(collection(db, 'chainLots'));
  const existingP = allSnap.docs.filter(d => d.id.startsWith(parentNo + '-P')).length;
  const partNo = parentNo + '-P' + (existingP + 1);
  const seq = existingP + 1;
  await setDoc(doc(db, 'chainLots', partNo), {
    no: partNo, parentNo: parentNo, seq: seq,
    wireNo: lot.no, meltNo: lot.meltNo||'',
    chainType: lot.chainType||'', left: sendWeight, claimed: sendWeight,
    chainLen: sendLen||0, rowNum: lot.rowNum||0,
    status: '검수대기', isUrgent: true,
    emp: empName, ts: serverTimestamp()
  });
  return {success:true, partNo: partNo, seq: seq};
}

// 체인 생산중량 일괄 저장
async function fbSaveChainsBatch(items, empName) {
  let made=0, haeriSum=0;
  // 부분전달(-C-P)로 이미 보낸 분 합계 (중복 방지)
  const allChains = await getDocs(collection(db, 'chainLots'));
  const sentMap = {};
  allChains.docs.forEach(d => {
    const data = d.data();
    if (data.parentNo && data.isUrgent) {
      sentMap[data.parentNo] = (sentMap[data.parentNo]||0) + (data.claimed||0);
    }
  });
  for (const it of items) {
    const wRef = doc(db,'wireLots', it.no);
    const wSnap = await getDoc(wRef);
    const wire = wSnap.data()||{};
    const haeri = (wire.left||0) - it.weight;
    haeriSum += haeri;
    // 선재 로트 상태 업데이트
    await updateDoc(wRef, {status:'사용됨', chainProd: it.weight, haeri, prodEmp: empName, prodTs: serverTimestamp()});
    // 체인 로트 생성 (부분전달분 차감)
    const chainNo = it.no + '-C';
    const sent = sentMap[chainNo] || 0;
    const remainW = Math.max(0, it.weight - sent);
    await setDoc(doc(db,'chainLots', chainNo), {
      no: chainNo, wireNo: it.no, meltNo: wire.meltNo||'',
      chainType: wire.chainType||'', left: remainW, haeri,
      chainLen: it.chainLen||0, rowNum: wire.rowNum||0,
      sentBefore: sent,
      status: remainW > 0 ? '검수대기' : '사용됨', claimed: remainW, emp: empName, ts: serverTimestamp()
    }, {merge:true});
    // rows 업데이트 (총 생산량 기준)
    if (wire.rowNum) {
      await updateDoc(doc(db,'rows','row_' + wire.rowNum), {
        chainProd: it.weight, haeri, chainEmp: empName, chainTs: serverTimestamp(),
        chainLenProd: it.chainLen || 0
      });
    }
    // 구글 시트 반영 (체인로트 + 생산시트 W~Y열 한번에)
    syncToSheet('updateChainLot', {
      no: chainNo, meltNo: wire.meltNo||'',
      chainType: wire.chainType||'', left: remainW,
      haeri, chainLen: it.chainLen||0,
      status: remainW > 0 ? '검수대기' : '사용됨', emp: empName,
      rowNum: wire.rowNum || ''
    });
    made++;
  }
  return {success:true, made, haeriSum};
}

// 용접 후중량 일괄 저장
async function fbSaveWeldsBatch(items, empName) {
  let made=0, incSum=0;
  for (const it of items) {
    const cRef = doc(db,'chainLots', it.no);
    const cSnap = await getDoc(cRef);
    const chain = cSnap.data()||{};
    const inc = it.weight - (chain.left||0);
    incSum += inc;

    // chainLots에 rowNum 없으면 wireNo로 wireLots에서 가져오기
    let rowNum = chain.rowNum || 0;
    if (!rowNum && chain.wireNo) {
      try {
        const wSnap2 = await getDoc(doc(db,'wireLots', chain.wireNo));
        if (wSnap2.exists()) rowNum = wSnap2.data().rowNum || 0;
      } catch(e) {}
    }

    await updateDoc(cRef, {status:'사용됨', weldAfter: it.weight, inc, weldEmp: empName, weldTs: serverTimestamp()});
    // 용접 이력 기록
    const weldNo = it.no + '-Z';
    await setDoc(doc(db,'welds', weldNo), {
      no: weldNo, chainNo: it.no, meltNo: chain.meltNo||'',
      weld: it.weight, inc, emp: empName, ts: serverTimestamp()
    }, {merge:true});
    // 백그라운드로 구글 시트에도 반영
    syncToSheet('updateWeldLog', {
      no: weldNo, chainNo: it.no, meltNo: chain.meltNo||'',
      weld: it.weight, inc, left: chain.left||0, emp: empName,
      rowNum: rowNum || ''
    });
    made++;
  }
  return {success:true, made, incSum};
}

// 생산시트 rows는 건드리지 않음 (외주이력 시트에만 기록)
async function fbOutsourceReturn(item, empName) {
  const wRef = doc(db, 'wireLots', item.no);
  const wSnap = await getDoc(wRef);
  if (!wSnap.exists()) return {success:false, error:'선재 로트를 찾을 수 없습니다'};
  const wire = wSnap.data();
  const haeri = (wire.left||0) - item.chainWeight;
  // 선재 로트: 사용됨 처리
  await updateDoc(wRef, {status:'사용됨', chainProd: item.chainWeight, haeri: haeri, prodEmp: empName, prodTs: serverTimestamp()});
  // 체인 로트 생성 (외주 표시, 검수대기 → 용접실 입고확인 목록에 등장)
  const chainNo = item.no + '-C';
  await setDoc(doc(db, 'chainLots', chainNo), {
    no: chainNo, wireNo: item.no, meltNo: wire.meltNo||'',
    chainType: wire.chainType||'', left: item.chainWeight, haeri: haeri,
    chainLen: item.chainLen||0, rowNum: wire.rowNum||0,
    status: '검수대기', claimed: item.chainWeight, isOutsource: true,
    emp: empName, ts: serverTimestamp()
  }, {merge:true});
  return {success:true, chainNo: chainNo, haeri: haeri};
}

      dept: S.dept, deptName: S.deptName, deptColor: S.deptColor,

    }));

}
function clearSession() {
  try { sessionStorage.removeItem('fa_sess'); } catch(e) {}
}

function loginKey(k) {
  if (k === 'del') { S.loginPin = S.loginPin.slice(0,-1); renderDots('loginDots', S.loginPin.length); }
  else if (k === 'ok') { doLoginVerify(); }
  else if (S.loginPin.length < 6) {
    S.loginPin += k; renderDots('loginDots', S.loginPin.length);
    if (S.loginPin.length === 4) setTimeout(doLoginVerify, 200);
  }
}

async function doLoginVerify() {
  if (!S.loginPin.length) return;
  showLoad();
  var ok = false;
  if (DEMO) {
    await sleep(400);
    var pw = {MGMT:'0000',MATERIAL:'1111',MACHINE:'2222',WELD:'3333',QUALITY:'4444',GARANG:'5555',ASSEMBLY:'6666',OUTSOURCE:'7777'};
    ok = pw[S.dept] === S.loginPin;
  } else {
    try { var r = await apiGet('verifyDept', {code:S.dept, pw:S.loginPin}); ok = r.success; }
    catch(e) { hideLoad(); toast('❌ 연결 오류', 2000, 'err'); return; }
  }
  hideLoad();
  if (ok) { S.loginPin = ''; enterDept(); }
  else { toast('❌ 비밀번호가 틀렸습니다', 2000, 'err'); S.loginPin = ''; renderDots('loginDots', 0); }
}

function enterDept() {
  if (S.dept === 'MATERIAL') { saveSession('menu'); openMenu(); }
  else if (S.dept === 'MACHINE') { saveSession('wireCheck'); openWireCheck(); }
  else if (S.dept === 'WELD') { saveSession('chainCheck'); openChainCheck(); }
  else if (S.dept === 'MGMT') { saveSession('menu'); openMenu(); }
  else { saveSession('menu'); openMenu(); }
}

function renderListBody(mode) {
  var filtered = S.rows.filter(function(r) {
    if (mode === 'wire')  return !r.wireReal;
    if (mode === 'chain') return r.wireReal && !r.chainProd;
    if (mode === 'weld')  return r.chainProd && !r.weldAfter;
    return true;
  });
  var body = document.getElementById('listBody');
  if (!body) return;
  if (!filtered.length) {
    body.innerHTML = '<div class="empty"><div class="eico">📭</div><div class="etxt">현재 입력할 항목이 없습니다</div></div>';
    return;
  }
  // 목록 다시 그리기 (openList의 렌더링 부분만 실행)
  if (mode === 'wire') {
    var groups = {}, groupOrder = [];
    filtered.forEach(function(row) {
      if (!groups[row.meltNo]) { groups[row.meltNo] = []; groupOrder.push(row.meltNo); }
      groups[row.meltNo].push(row);
    });
    body.innerHTML = '';
    groupOrder.forEach(function(meltNo) {
      var remainRows = groups[meltNo];
      var allRows = S.rows.filter(function(r) { return r.meltNo === meltNo; });
      var card = document.createElement('div');
      card.className = 'row-card';
      card.style.borderLeftColor = S.deptColor;
      card.innerHTML = buildCard(allRows[0], mode);
      card.onclick = function() { S.selRow = allRows[0]; openWireGroupInp(meltNo, remainRows); };
      body.appendChild(card);
    });
  } else {
    body.innerHTML = '';
    filtered.forEach(function(row) {
      var card = document.createElement('div');
      card.className = 'row-card';
      card.style.borderLeftColor = S.deptColor;
      card.innerHTML = buildCard(row, mode);
      card.onclick = function() { S.selRow = row; openInp(mode, row); };
      body.appendChild(card);
    });
  }
}

async function openList(mode) {
  S.inpMode = mode;
  var titles = {wire:'용해 등록 목록', chain:'체인 생산 목록', weld:'용접 목록', view:'오늘 생산현황'};
  document.getElementById('listTitle').textContent = titles[mode] || '목록';
  document.getElementById('listHdr').style.background = S.deptColor;
  var _lkb = document.getElementById('listBack'); _lkb.onclick = goHome; _lkb.textContent = '← 홈';
  showLoad();

  if (DEMO) { await sleep(400); S.rows = demoRows(); }
  else {
    try { var r = await apiGet('getRows', {dept:S.dept}); S.rows = r.data || []; }
    catch(e) { S.rows = demoRows(); }
    // wireLots 캐시 (긴급전달 잔량 표시용)
    try {
      var wlr = await apiGet('getWireLotsByStatus', {});
      S._wireLotCache = wlr.data || [];
    } catch(e) { S._wireLotCache = []; }
    // 행별 전달 합계 부착 (목록 카드 잔량 표시용)
    var _um = {};
    (S._wireLotCache || []).forEach(function(w) {
      if (w.isUrgent && w.rowNum) _um[w.rowNum] = (_um[w.rowNum]||0) + (w.claimed||0);
    });
    S.rows.forEach(function(r) { r.urgentSent = _um[r.rowNum] || 0; });
  }
  hideLoad();

  var filtered = S.rows.filter(function(r) {
    if (mode === 'wire')  return !r.wireReal;
    if (mode === 'chain') return r.wireReal && !r.chainProd;
    if (mode === 'weld')  return r.chainProd && !r.weldAfter;
    return true;
  });

  var body = document.getElementById('listBody');
  body.innerHTML = '';
  if (!filtered.length) {
    body.innerHTML = '<div class="empty"><div class="eico">📭</div><div class="etxt">현재 입력할 항목이 없습니다</div></div>';
    show('listSc'); return;
  }

  if (mode === 'wire') {
    // 용해번호별 묶음 — 남은(미완성) 선재만 카드로, 진행현황은 전체 기준
    var groups = {};
    var groupOrder = [];
    filtered.forEach(function(row) {
      if (!groups[row.meltNo]) { groups[row.meltNo] = []; groupOrder.push(row.meltNo); }
      groups[row.meltNo].push(row);
    });
    groupOrder.forEach(function(meltNo) {
      var remainRows = groups[meltNo];
      var allRows = S.rows.filter(function(r) { return r.meltNo === meltNo; });
      var total = allRows.length;
      var doneRows = allRows.filter(function(r) { return r.wireReal; });
      var done = doneRows.length;
      var remain = total - done;
      var first = remainRows[0];

      // 선재종류 · 예상중량 · 후중량 한 줄, 연한 실선 구분
      var headHtml =
        '<div style="display:flex;gap:14px;padding:3px 0 5px;font-size:11px;color:#aaa;font-weight:600">' +
          '<span style="flex:0 0 96px">선재종류</span>' +
          '<span style="flex:0 0 70px;text-align:right">예상중량</span>' +
          '<span style="flex:0 0 70px;text-align:right">후중량</span>' +
        '</div>';
      var rowsHtml = allRows.map(function(r) {
        var doneRow = !!r.wireReal;
        var realTxt = doneRow
          ? '<span style="color:#2e7d32;font-weight:700">' + fmt(r.wireReal) + 'g</span>'
          : '<span style="color:#cfcfcf">—</span>';
        var nameTxt = (doneRow ? '✅ ' : '') + (r.wireType||'-');
        var urgentBtn = '';
        return '<div style="display:flex;gap:14px;align-items:center;padding:7px 0;border-bottom:1px solid #f1f1f1' + (doneRow ? '' : ';opacity:.5') + '">' +
            '<span style="flex:0 0 96px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + nameTxt + '</span>' +
            '<span style="flex:0 0 70px;text-align:right;color:#1565c0;font-weight:700">' + fmt(r.wirePlan) + 'g</span>' +
            '<span style="flex:0 0 70px;text-align:right">' + realTxt + '</span>' +
            urgentBtn +
          '</div>';
      }).join('');

      var card = document.createElement('div');
      card.className = 'row-card';
      card.style.borderLeftColor = S.deptColor;
      card.innerHTML =
        '<span class="row-arrow">›</span>' +
        '<div class="row-title">' + meltNo + '</div>' +
        '<div class="row-sub">' + (first.material||'') + ' ' + (first.content||'-') + '%</div>' +
        '<div style="font-size:20px;font-weight:700;margin:8px 0 10px">총 <b>' + total + '</b>종 &nbsp;·&nbsp; <span style="color:#2e7d32">완성 <b>' + done + '</b></span> &nbsp;·&nbsp; <span style="color:#1565c0">남음 <b>' + remain + '</b></span></div>' +
        headHtml + rowsHtml;
      card.onclick = function() { openWireGroupInp(meltNo, remainRows); };
      body.appendChild(card);
    });
  } else {
    filtered.forEach(function(row) {
      var card = document.createElement('div');
      card.className = 'row-card';
      card.style.borderLeftColor = S.deptColor;
      card.innerHTML = buildCard(row, mode);
      if (mode !== 'view') {
        card.onclick = function() { S.selRow = row; openInp(mode, row); };
      }
      body.appendChild(card);
    });
  }
  show('listSc');

  // 30초마다 자동 새로고침 (구글 시트 새 행 자동 반영)
  if (S._listPollTimer) clearInterval(S._listPollTimer);
  S._listPollTimer = setInterval(async function() {
    var listSc = document.getElementById('listSc');
    if (!listSc || !listSc.classList.contains('active')) {
      clearInterval(S._listPollTimer); return;
    }
    try {
      var r = await apiGet('getRows', {dept: S.dept});
      var newRows = r.data || [];
      if (newRows.length !== S.rows.length) {
        S.rows = newRows;
        renderListBody(S.inpMode);
        toast('🔄 새 작업계획이 추가됐어요!', 2000, 'ok');
      }
    } catch(e) {}
  }, 15000);


}

function buildCard(r, mode) {
  if (mode === 'wire') {
    return '<span class="row-arrow">›</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.wireType||'-') + ' &nbsp;|&nbsp; ' + (r.material||'') + ' ' + (r.content||'-') + '%</div>' +
      '<div class="row-info">' +
        '순은 <b>' + fmt(r.silver) + 'g</b>&nbsp;&nbsp; 알로이 <b>' + fmt(r.alloy) + 'g</b>&nbsp;&nbsp; 연주로 <b>' + fmt(r.furnace) + 'g</b><br>' +
        '재말수령 <b>' + fmt(r.scrapRecv) + 'g</b>&nbsp;&nbsp; 재말투입 <b>' + fmt(r.scrapUse) + 'g</b>&nbsp;&nbsp; 재말잔량 <b>' + fmt(r.scrapLeft) + 'g</b><br>' +
        '불량선재 <b>' + fmt(r.badWire) + 'g</b>&nbsp;&nbsp; 예상중량 <b style="color:#1565c0;font-size:20px">' + fmt(r.wirePlan) + 'g</b>' +
        (r.urgentSent > 0
          ? '<br>🚀 전달 <b style="color:#e65100;font-size:20px">' + fmt(r.urgentSent) + 'g</b>&nbsp;&nbsp; 잔량 <b style="color:#2e7d32;font-size:20px">' + fmt(Math.max(0, (r.wirePlan||0) - r.urgentSent)) + 'g</b>'
          : '') +
      '</div>';
  }
  if (mode === 'chain') {
    return '<span class="row-arrow">›</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.chainType||'-') + ' &nbsp;|&nbsp; ' + (r.wireType||'-') + '</div>' +
      '<div class="row-info">' +
        '선재후중량 <b style="color:#2e7d32;font-size:20px">' + fmt(r.wireReal) + 'g</b>&nbsp;&nbsp; 계획 <b>' + fmt(r.chainPlan) + 'g</b>' +
      '</div>';
  }
  if (mode === 'weld') {
    return '<span class="row-arrow">›</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.chainType||'-') + '</div>' +
      '<div class="row-info">' +
        '체인생산 <b style="font-size:20px">' + fmt(r.chainProd) + 'g</b>&nbsp;&nbsp; 해리 <b style="color:#e53935;font-size:20px">' + fmt(r.haeri) + 'g</b>' +
      '</div>';
  }
  var step = r.weldAfter ? '✅ 용접완료' : r.chainProd ? '⚙️ 기계완료' : r.wireReal ? '⚗️ 선재완료' : '📋 대기';
  return '<div class="row-title">' + r.meltNo + ' — ' + (r.wireType||'') + '</div>' +
    '<div class="row-sub">' + (r.material||'') + ' ' + (r.content||'-') + '% &nbsp;|&nbsp; ' + step + '</div>' +
    '<div class="row-info">' +
      '선재 <b>' + fmt(r.wireReal) + 'g</b> → 체인 <b>' + fmt(r.chainProd) + 'g</b> → 해리 <b style="color:#e53935">' + fmt(r.haeri) + 'g</b> → 용접후 <b>' + fmt(r.weldAfter) + 'g</b>' +
    '</div>';
}

async function doQuickUrgentTransfer(row, sendWeight, dest) {
  showLoad();
  try {
    var emp = S.user ? S.user.name : '미확인';
    var isOut = (dest === 'OUTSOURCE');
    var r = await window._fbApi.fbUrgentTransfer(row, sendWeight, emp, dest);
    hideLoad();
    if (r.success) {
      syncToSheet('addUrgentWireLot', {
        no: r.partNo, seq: r.seq,
        parentNo: String(row.rowNum) + '-W',
        meltNo: row.meltNo||'', wtype: row.wireType||'',
        mat: row.material||'', cont: row.content||'',
        left: sendWeight, claimed: sendWeight,
        chainType: row.chainType||'',
        chainLen: row.chainLen||'', chainWt: row.chainWt||0,
        status: isOut ? '외주출고' : '검수대기', rowNum: row.rowNum,
        isUrgent: true, emp: emp
      });
      if (isOut) {
        syncToSheet('addOutsourceOut', {
          no: r.partNo, meltNo: row.meltNo||'', wtype: row.wireType||'',
          chainType: row.chainType||'', outWeight: sendWeight, emp: emp
        });
      }
      // 화면의 전달/잔량 표시 즉시 갱신
      row.urgentSent = (row.urgentSent || 0) + sendWeight;
      var sp = document.getElementById('urgSent_' + row.rowNum);
      if (sp) {
        sp.innerHTML = ' · <span style="color:#e65100;font-weight:700">전달 ' + fmt(row.urgentSent) + 'g · 잔량 ' + fmt(Math.max(0, (row.wireReal || row.wirePlan || 0) - row.urgentSent)) + 'g</span>';
      }
      toast(isOut
        ? '✅ ' + r.seq + '차 ' + fmt(sendWeight) + 'g — 외주로 보냈습니다'
        : '✅ ' + r.seq + '차 ' + fmt(sendWeight) + 'g — 기계실로 보냈습니다', 2800, 'ok');
    }
  } catch(e) {
    hideLoad();
    toast('❌ ' + (e.message || '전달 실패'), 2500, 'err');
  }
}

    hideLoad();

      syncToSheet('updateChainLot', {

        chainType: lot.chainType||'', left: sendWeight,
        haeri: 0, chainLen: sendLen||0,

      });

      S._chainSentMap[pKey] = (S._chainSentMap[pKey]||0) + sendWeight;

    } else toast('❌ ' + (r.error || '전달 실패'), 2500, 'err');
  } catch(e) {
    hideLoad();
    toast('❌ ' + (e.message || '전달 실패'), 2500, 'err');

}

function openKPWireByNum(rowNum) {
  var row = G_WIRE_ROWS[rowNum];

}
function openKPWire(rowNum, label) {
  S.kpField = 'ww_' + rowNum;
  S.kpVal = S.fields.wireWeights[rowNum] ? String(S.fields.wireWeights[rowNum]) : '';
  document.getElementById('kpLbl').textContent = label + ' 실중량 (g)';
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
  document.getElementById('kpBg').classList.add('on');
  document.getElementById('kpSheet').classList.add('on');
}

async function doSaveWireGroup(rows) {
  var emp = S.user ? S.user.name : '미확인';
  var meltNo = rows[0].meltNo;
  var items = rows.map(function(row) {
    return {
      rowNum: row.rowNum,
      weight: S.fields.wireWeights[row.rowNum] || 0,
      meltNo: row.meltNo||'', wireType: row.wireType||'',
      material: row.material||'', content: row.content||'',
      chainType: row.chainType||'', chainLen: row.chainLen||'', chainWt: row.chainWt||0
    };
  }).filter(function(it) { return it.weight > 0; });
  if (!items.length) { toast('⚠️ 입력된 실중량이 없습니다', 2000, 'err'); return; }

  // 차이값 포함
  var badWireOut = S.fields.badWireOut || 0;
  var scrapOut   = S.fields.scrapOut   || 0;

  showLoad();
  if (DEMO) {
    await sleep(250); hideLoad();
    applyWireLocal(items);
    toast('✅ 저장 완료 (데모)', 1500, 'ok');
    afterWireSave(meltNo); return;
  }
  try {
    var r = await apiPost({action:'saveWires', empName:emp, items:items});
    hideLoad();
    if (r.success) {
      applyWireLocal(items);
      // 차이값 구글 시트 반영
      if (badWireOut || scrapOut) {
        items.forEach(function(it) {
          syncToSheet('updateDiff', {
            rowNum: it.rowNum,
            mode: 'wire',
            badWire: badWireOut,
            scrapOut: scrapOut,
            emp: emp
          });
        });
      }
      toast('✅ 저장 완료 · 기계실로 전달됨', 1600, 'ok');
      afterWireSave(meltNo);
    } else {
      toast('❌ 저장 실패: ' + (r.error||''), 2500, 'err');
    }
  } catch(e) { hideLoad(); toast('❌ 연결 오류', 2500, 'err'); }
}

// 방금 저장한 값을 로컬 데이터에 즉시 반영
function applyWireLocal(items) {
  items.forEach(function(it) {
    for (var i = 0; i < S.rows.length; i++) {
      if (S.rows[i].rowNum === it.rowNum) { S.rows[i].wireReal = it.weight; break; }
    }
  });
}

// ── 긴급전달 목록 화면 ────────────────────────────────────────
async function openUrgentList() {
  saveSession('urgentList');
  document.getElementById('listTitle').textContent = '🚀 긴급전달';
  document.getElementById('listHdr').style.background = S.deptColor;
  var _lb = document.getElementById('listBack');
  _lb.onclick = function() { saveSession('menu'); openMenu(); };
  _lb.textContent = '← 메뉴';
  showLoad();

  // 전체 rows 조회 (후중량 입력 전/후 모두)
  var rows = [];
  try { var r = await apiGet('getRows', {}); rows = r.data || []; S.rows = rows; } catch(e) {}

  // 용접 완료된 것 제외, 체인생산 완료 안된 것만 (아직 처리 필요한 것)
  var urgentRows = rows.filter(function(r) { return !r.chainProd; });

  // wireLots에서 이미 전달된 건 조회 (rowNum별 전달 횟수)
  var wireLotSnap = [];
  try {
    var wlr = await apiGet('getWireLotsByStatus', {});
    wireLotSnap = wlr.data || [];
  } catch(e) {}

  // rowNum별 긴급전달 이력 (P로트만)
  var urgentMap = {};
  wireLotSnap.forEach(function(w) {
    if (w.parentNo && w.isUrgent) {
      var rn = w.rowNum;
      if (!urgentMap[rn]) urgentMap[rn] = [];
      urgentMap[rn].push(w);
    }
  });

  hideLoad();

  var body = document.getElementById('listBody');
  body.innerHTML = '';

  if (!urgentRows.length) {
    body.innerHTML = '<div class="empty"><div class="eico">📭</div><div class="etxt">긴급전달 가능한 항목이 없습니다</div></div>';
    show('listSc'); return;
  }

  urgentRows.forEach(function(row) {
    var history = urgentMap[row.rowNum] || [];
    var totalSent = history.reduce(function(s, w) { return s + (w.claimed||0); }, 0);
    row.urgentSent = totalSent;
    var wirePlan = row.wirePlan || 0;

    // 이력 표시
    var histHtml = '';
    if (history.length) {
      histHtml = '<div style="margin-top:8px;padding:8px;background:#fff8e1;border-radius:8px">' +
        '<div style="font-size:11px;color:#e65100;font-weight:500;margin-bottom:4px">전달 이력</div>';
      history.forEach(function(w, i) {
        var ts = w.ts && w.ts.toDate ? w.ts.toDate().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '';
        histHtml += '<div style="font-size:12px;color:#555;display:flex;justify-content:space-between">' +
          '<span>' + (i+1) + '차 전달' + (w.isOutsource ? ' <span style="color:#546e7a;font-weight:600">🚚외주</span>' : '') + ' · ' + (w.emp||'') + ' ' + ts + '</span>' +
          '<span style="font-weight:500;color:#e65100">' + fmt(w.claimed) + 'g</span>' +
        '</div>';
      });
      histHtml += '<div style="font-size:12px;font-weight:500;color:#e65100;border-top:0.5px solid #ffd180;margin-top:4px;padding-top:4px;display:flex;justify-content:space-between">' +
        '<span>총 전달</span><span>' + fmt(totalSent) + 'g</span></div>' +
        '</div>';
    }

    // 잔량 계산 (후중량 있으면 후중량 기준, 없으면 예상중량 기준)
    var baseWeight = row.wireReal || row.wirePlan || 0;
    var baseLabel = row.wireReal ? '후중량' : '예상';
    var remaining = baseWeight > 0 ? baseWeight - totalSent : 0;
    var remainTxt = baseWeight > 0
      ? '<span style="color:#e65100;font-weight:500">' + baseLabel + ' ' + fmt(baseWeight) + 'g · 전달 ' + fmt(totalSent) + 'g · <b>잔량 ' + fmt(Math.max(0,remaining)) + 'g</b></span>'
      : '<span style="color:#aaa">예상중량 미입력</span>';

    var card = document.createElement('div');
    card.className = 'row-card';
    card.style.cssText = 'border-left-color:#e65100;border-left-width:3px';
    card.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div>' +
          '<div class="row-title">' + (row.meltNo||'-') + '</div>' +
          '<div class="row-sub">' + (row.wireType||'-') + '</div>' +
        '</div>' +
        '<div style="text-align:right">' +
          '<div style="font-size:12px;color:var(--color-text-secondary)">예상 ' + fmt(wirePlan) + 'g</div>' +
          (row.wireReal ? '<div style="font-size:14px;font-weight:500;color:#2e7d32">후중량 ' + fmt(row.wireReal) + 'g</div>' : '<div style="font-size:13px;color:#aaa">후중량 미입력</div>') +
        '</div>' +
      '</div>' +
      histHtml +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">' +
        remainTxt +
        '<button onclick="event.stopPropagation();openUrgentTransfer(' + row.rowNum + ')" ' +
          'style="padding:10px 20px;font-size:14px;font-weight:500;background:#e65100;color:#fff;border:none;border-radius:10px;cursor:pointer">🚀 전달하기</button>' +
      '</div>';
    body.appendChild(card);
  });

  show('listSc');
}

// ── 긴급전달 팝업 (입력 화면 팝업과 동일 디자인) ──────────────

  var sent = row.urgentSent || 0;
  var left = Math.max(0, base - sent);

  var overlay = document.createElement('div');
  overlay.id = 'urgentOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center';

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<div>' +
        '<div style="font-size:22px;font-weight:800;color:#e65100">🚀 일부 먼저 보내기</div>' +
        '<div style="font-size:16px;color:#666;margin-top:2px">' + (row.meltNo||'-') + ' · ' + (row.wireType||'-') + '</div>' +
      '</div>' +

    '</div>' +
    '<div style="background:#fff8e1;border-radius:14px;padding:16px;margin-bottom:16px">' +
      '<div style="display:flex;justify-content:space-between;font-size:19px;color:#555;padding:4px 0">' +

        '<span>이미 보낸 양</span><b style="font-size:22px;color:#e65100">' + fmt(sent) + 'g</b></div>' +
      '<div style="display:flex;justify-content:space-between;font-size:19px;color:#555;padding:6px 0 0;border-top:2px solid #ffd180;margin-top:4px">' +
        '<span><b>보낼 수 있는 양</b></span><b style="font-size:26px;color:#2e7d32">' + fmt(left) + 'g</b></div>' +
    '</div>' +
    '<div style="font-size:17px;color:#666;font-weight:700;margin-bottom:8px">어디로 보내나요?</div>' +
    '<div style="display:flex;gap:10px;margin-bottom:16px">' +
      '<button id="urgDestM" style="flex:1;padding:16px;font-size:19px;font-weight:800;border:2px solid #e65100;border-radius:12px;background:#e65100;color:#fff;cursor:pointer">⚙️ 기계실</button>' +

    }

  document.getElementById('urgDestO').onclick = function() { urgDest = 'OUTSOURCE'; paintDest(); };
  // 실시간 남는 양 표시
  inp.oninput = function() {
    var w = parseFloat(this.value);
    var t = document.getElementById('urgLeftTxt');

      var after = left - w;
      t.innerHTML = after < 0
        ? '<b style="color:#c62828">⚠️ 보낼 수 있는 양보다 ' + fmt(-after) + 'g 많습니다</b>'
        : '보내고 남는 양: <b style="color:#2e7d32;font-size:20px">' + fmt(after) + 'g</b>';
    } else t.textContent = '';
  };
  document.getElementById('urgConfirm').onclick = function() {
    var w = parseFloat(inp.value);
    if (!w || w <= 0) { toast('⚠️ 중량을 입력하세요', 1500, 'err'); return; }
    var dest = urgDest;
    overlay.remove();
    requirePin(function() { doUrgentTransfer(row, w, dest); });
  };
}

async function doUrgentTransfer(row, sendWeight, dest) {
  showLoad();
  try {
    var emp = S.user ? S.user.name : '미확인';
    var isOut = (dest === 'OUTSOURCE');
    var r = await window._fbApi.fbUrgentTransfer(row, sendWeight, emp, dest);
    hideLoad();
    if (r.success) {
      // 구글 시트 선재로트에 전달 이력 행 추가
      syncToSheet('addUrgentWireLot', {
        no: r.partNo, seq: r.seq,
        parentNo: String(row.rowNum) + '-W',
        meltNo: row.meltNo||'', wtype: row.wireType||'',
        mat: row.material||'', cont: row.content||'',
        left: sendWeight, claimed: sendWeight,
        chainType: row.chainType||'',
        chainLen: row.chainLen||'', chainWt: row.chainWt||0,
        status: isOut ? '외주출고' : '검수대기', rowNum: row.rowNum,
        isUrgent: true, emp: emp
      });
      // 외주 출고는 외주이력 시트에도 기록
      if (isOut) {
        syncToSheet('addOutsourceOut', {
          no: r.partNo, meltNo: row.meltNo||'', wtype: row.wireType||'',
          chainType: row.chainType||'', outWeight: sendWeight, emp: emp
        });
      }
      toast(isOut
        ? '✅ ' + r.seq + '차 외주출고 ' + fmt(sendWeight) + 'g 완료'
        : '✅ ' + r.seq + '차 긴급전달 ' + fmt(sendWeight) + 'g 완료', 2500, 'ok');
      openUrgentList();
    }
  } catch(e) {
    hideLoad();
    toast('❌ ' + (e.message || '전달 실패'), 2500, 'err');
  }
}

async function doSave(mode) {
  showLoad();
  var emp = S.user ? S.user.name : '미확인';
  var row = S.selRow;
  var payload = {empName:emp, rowNum:row.rowNum, weight:S.fields.weight};

  // 차이값 추가
  if (mode === 'wire') {
    payload.badWire  = S.fields.badWire  || 0;
    payload.scrapOut = S.fields.scrapOut || 0;
  } else if (mode === 'chain') {
    payload.chainBad = S.fields.chainBad || 0;
    // 해리 자동계산
    payload.haeri = (row.wireReal || 0) - (S.fields.weight || 0);
  } else if (mode === 'weld') {
    payload.weldBad = S.fields.weldBad || 0;
    // 용접 증가량 자동계산
    payload.weldInc = (S.fields.weight || 0) - (row.chainProd || 0);
  }

  var msg = '✅ 저장 완료';
  if (DEMO) { await sleep(600); hideLoad(); toast(msg + ' (데모)', 3000, 'ok'); setTimeout(goMenu, 2200); return; }
  try {
    var action = mode === 'wire' ? 'saveWire' : mode === 'chain' ? 'saveChain' : 'saveWeld';
    payload.action = action;
    var r = await apiPost(payload);
    hideLoad();
    if (r.success) {
      // 차이값 구글 시트에 반영
      if (mode === 'wire' && (payload.badWire || payload.scrapOut)) {
        syncToSheet('updateDiff', {rowNum:row.rowNum, mode:'wire', badWire:payload.badWire, scrapOut:payload.scrapOut, emp:emp});
      } else if (mode === 'chain' && payload.haeri) {
        syncToSheet('updateDiff', {rowNum:row.rowNum, mode:'chain', haeri:payload.haeri, chainBad:payload.chainBad||0, emp:emp});
      } else if (mode === 'weld' && payload.weldInc) {
        syncToSheet('updateDiff', {rowNum:row.rowNum, mode:'weld', weldInc:payload.weldInc, weldBad:payload.weldBad||0, emp:emp});
      }
      // Firebase rows 업데이트
      var diffData = {};
      if (mode === 'wire')  { diffData.badWireOut = payload.badWire||0; diffData.scrapOut = payload.scrapOut||0; }
      if (mode === 'chain') { diffData.haeri = payload.haeri||0; diffData.chainBad = payload.chainBad||0; }
      if (mode === 'weld')  { diffData.weldInc = payload.weldInc||0; diffData.weldBad = payload.weldBad||0; }
      if (Object.keys(diffData).length) {
        try { await window._fbApi.fbUpdateRow(row.rowNum, diffData); } catch(e) {}
      }
      toast(msg, 3000, 'ok');
      setTimeout(goMenu, 2200);
    }
    else toast('❌ 저장 실패: ' + (r.error||''), 3000, 'err');
  } catch(e) { hideLoad(); toast('❌ 연결 오류', 3000, 'err'); }
}

function buildKpGrid() {
  var g = document.getElementById('kpGrid');
  ['1','2','3','4','5','6','7','8','9','del','0','.'].forEach(function(k) {
    var b = document.createElement('button');
    b.className = 'nk' + (k === 'del' ? ' del' : '');
    b.textContent = k === 'del' ? '⌫' : k;
    b.ontouchstart = function(e) { e.preventDefault(); kpPress(k); };
    b.onclick = function() { kpPress(k); };
    g.appendChild(b);
  });
  var ok = document.createElement('button');
  ok.className = 'nk ok kp-ok'; ok.textContent = '✓ 확인 (Enter)';
  ok.ontouchstart = function(e) { e.preventDefault(); closeKP(); };
  ok.onclick = closeKP;
  g.appendChild(ok);

  // ★ PC 키보드 입력 지원 (숫자키패드 + 로그인PIN + 담당자PIN)
  document.addEventListener('keydown', function(e) {
    var kpSheet  = document.getElementById('kpSheet');
    var loginSc  = document.getElementById('loginSc');
    var pinOvl   = document.getElementById('pinOvl');

    // 숫자 키패드 (중량 입력)
    if (kpSheet && kpSheet.classList.contains('on')) {
      if (e.key >= '0' && e.key <= '9') { kpPress(e.key); e.preventDefault(); }
      else if (e.key === '.') { kpPress('.'); e.preventDefault(); }
      else if (e.key === 'Backspace') { kpPress('del'); e.preventDefault(); }
      else if (e.key === 'Enter') { closeKP(); e.preventDefault(); }
      else if (e.key === 'Escape') { cancelKP(); e.preventDefault(); }
      return;
    }

    // 부서 로그인 PIN
    if (loginSc && loginSc.classList.contains('active')) {
      if (e.key >= '0' && e.key <= '9') { loginKey(e.key); e.preventDefault(); }
      else if (e.key === 'Backspace') { loginKey('del'); e.preventDefault(); }
      else if (e.key === 'Enter') { loginKey('ok'); e.preventDefault(); }
      return;
    }

    // 담당자 PIN (저장 확인)
    if (pinOvl && pinOvl.classList.contains('on')) {
      if (e.key >= '0' && e.key <= '9') { pinKey(e.key); e.preventDefault(); }
      else if (e.key === 'Backspace') { pinKey('del'); e.preventDefault(); }
      else if (e.key === 'Enter') { pinKey('ok'); e.preventDefault(); }
      else if (e.key === 'Escape') { closePinOvl(); e.preventDefault(); }
      return;
    }
  });
}
function fmtKp(v) {
  var parts = (v || '0').split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}
function kpPress(k) {
  if (k === 'del') S.kpVal = S.kpVal.slice(0,-1);
  else if (k === '.') { if (!S.kpVal.includes('.')) S.kpVal += '.'; }
  else if (S.kpVal.length < 9) S.kpVal += k;
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
}
function openKP(field, label) {
  S.kpField = field; S.kpVal = S.fields[field] ? String(S.fields[field]) : '';
  document.getElementById('kpLbl').textContent = label;
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
  document.getElementById('kpBg').classList.add('on');
  document.getElementById('kpSheet').classList.add('on');
}
function hideKpSheet() {
  document.getElementById('kpBg').classList.remove('on');
  document.getElementById('kpSheet').classList.remove('on');
}
function cancelKP() { hideKpSheet(); }   // 값 반영 없이 닫기 — '✓확인'을 눌러야만 입력 반영
function closeKP() {
  var v = parseFloat(S.kpVal) || 0;
  if (S.kpField.indexOf('chk_') === 0) {            // 기계실 측정중량 → 필드에 표시
    var cno = S.kpField.slice(4);
    var px = S.pendMap[cno];
    var claimed = px ? (parseFloat(px.claimed) || 0) : 0;
    if (v > 0 && claimed > 0 && Math.abs(v - claimed) > claimed * 0.05) {
      hideKpSheet();
      var src = (S.checkKind === 'chain') ? '기계실' : '자재실';
      toast('🚫 ' + src + ' 신고 ' + fmt(claimed) + 'g · 측정 ' + fmt(v) + 'g — 5% 초과, 다시 측정하세요', 4200, 'err');
      return;
    }
    S.checkVals[cno] = v;
    var ce = document.getElementById('chk_' + cno);
    if (ce) ce.textContent = fmt(v);
    hideKpSheet();
    return;
  }
  if (S.kpField.indexOf('prodDiff_') === 0) {      // 체인/용접 차이값 입력
    var dfield = S.kpField.slice(9);
    var dv = parseFloat(S.kpVal) || 0;
    if (!S.prodDiff) S.prodDiff = {};
    S.prodDiff[dfield] = dv;
    var del = document.getElementById('v_' + (dfield === 'chainBad' ? 'chainBad2' : 'weldBad2'));
    if (del) del.textContent = dv;
    hideKpSheet(); return;
  }
  if (S.kpField.indexOf('prodLen_') === 0) {        // 체인 길이 입력
    var no = S.kpField.slice(8);
    var v = parseFloat(S.kpVal) || 0;
    if (!S.prodLens) S.prodLens = {};
    S.prodLens[no] = v;
    var el = document.getElementById('pl_' + no);
    if (el) el.textContent = v || 0;
    hideKpSheet(); return;
  }
  if (S.kpField.indexOf('prod_') === 0) {           // 체인 생산중량/용접 후중량(필드 표시)
    var pno = S.kpField.slice(5);
    S.prodVals[pno] = v;
    var pce = document.getElementById('pv_' + pno);
    if (pce) pce.textContent = fmt(v);
    hideKpSheet();
    return;
  }
  if (S.kpField.indexOf('use_') === 0) {            // 로트 투입 사용량
    var no = S.kpField.slice(4);
    var lot = S.availMap[no];
    if (v <= 0) { delete S.basket[no]; }
    else { if (lot && v > lot.left) v = lot.left; S.basket[no] = {lot:lot, used:v}; }
    hideKpSheet(); renderLotAvail(); renderBasket(); return;
  }
  if (S.kpField === 'prodWeight') {                 // 체인생산/용접후중량
    S.fields.prodWeight = v; hideKpSheet(); renderBasket(); return;
  }
  if (S.kpField.indexOf('ww_') === 0) {
    var rowNum = parseInt(S.kpField.replace('ww_', ''));
    if (S.fields.wireWeights) S.fields.wireWeights[rowNum] = v;
    var el = document.getElementById(S.kpField);
    if (el) el.textContent = fmt(v);
  } else {
    S.fields[S.kpField] = v;
    var el2 = document.getElementById('v_' + S.kpField);
    if (el2) el2.textContent = fmt(v);
  }
  hideKpSheet();
}

async function apiGet(action, params) {
  var api = window._fbApi;
  // 모두 Firebase (빠른 속도) - 설정은 구글시트 수정 후 동기화 버튼으로 반영
  if (action === 'verifyDept')       return api.fbVerifyDept(params.code, params.pw);
  if (action === 'verifyEmp')        return api.fbVerifyEmp(params.pin, params.dept);
  if (action === 'getRows')          return { data: await api.fbGetRows(params.dept||'') };
  if (action === 'getPendingWires')  return { data: await api.fbGetPendingWires() };
  if (action === 'getPendingChains') return { data: await api.fbGetPendingChains() };
  if (action === 'getWireLots')      return { data: await api.fbGetWireLots() };
  if (action === 'getWireLotsByStatus') {
    var FS1 = window._fbFirestore;
    var snap1 = await FS1.getDocs(FS1.collection(window._db, 'wireLots'));
    return { data: snap1.docs.map(function(d) { return d.data(); }) };
  }
  if (action === 'getChainLotsAll') {
    var FS2 = window._fbFirestore;
    var snap2 = await FS2.getDocs(FS2.collection(window._db, 'chainLots'));
    return { data: snap2.docs.map(function(d) { return d.data(); }) };
  }
  if (action === 'getChainLots')     return { data: await api.fbGetChainLots() };
  if (action === 'getInventory')     return api.fbGetInventory();
  if (action === 'getShipments')     return { data: await api.fbGetShipments() };
  if (action === 'getOutsourceWires') return { data: await api.fbGetOutsourceWires() };
  if (action === 'getOutsourceChains') return { data: await api.fbGetOutsourceChains() };
  throw new Error('Unknown action: ' + action);
}
async function apiPost(data) {
  var api = window._fbApi;
  var act = data.action;
  if (act === 'saveWire')        return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'saveWires')       return api.fbSaveWires(data.items, data.empName);
  if (act === 'saveChain')       return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'saveWeld')        return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'confirmWires')    return api.fbConfirmWires(data.items, data.empName);
  if (act === 'confirmChains')   return api.fbConfirmChains(data.items, data.empName);
  if (act === 'saveChainsBatch') return api.fbSaveChainsBatch(data.items, data.empName);
  if (act === 'saveWeldsBatch')  return api.fbSaveWeldsBatch(data.items, data.empName);
  if (act === 'cancelLot')       return api.fbCancelLot(data.kind, data.no, data.restore);
  if (act === 'addShipment')     return api.fbAddShipment(data);
  if (act === 'cancelShipment')  return api.fbCancelShipment(data.no, data.restore);
  if (act === 'outsourceReturn') return api.fbOutsourceReturn(data.item, data.empName);
  if (act === 'chainUrgent')     return api.fbChainUrgentTransfer(data.lot, data.weight, data.len, data.empName);
  if (act === 'resetTestData')   return api.fbResetTestData();
  throw new Error('Unknown action: ' + act);
}

function submitProduce() {
  var isChain = S.lotKind === 'chain';

  if (isChain) {
    var allNos = Object.keys(S.prodVals || {}).concat(Object.keys(S.prodLens || {}));
    var uniqueNos = allNos.filter(function(v, i, a) { return a.indexOf(v) === i; });
    var items = [];
    uniqueNos.forEach(function(no) {
      var w = (S.prodVals && S.prodVals[no]) || 0;
      var l = (S.prodLens && S.prodLens[no]) || 0;
      if (w > 0 || l > 0) items.push({no: no, weight: w, chainLen: l});
    });
    if (!items.length) { toast('⚠️ 생산중량 또는 길이를 입력하세요', 2000, 'err'); return; }

    // 먼저 보낸 양보다 작은 입력 차단 (입력 = 먼저 보낸 것 포함 총 생산량)
    var tooSmallC = [];
    items.forEach(function(it) {
      var sentC = (S._chainSentMap && S._chainSentMap[it.no + '-C']) || 0;
      if (it.weight > 0 && sentC > 0 && it.weight < sentC) {
        tooSmallC.push(it.no + ': 입력 ' + fmt(it.weight) + 'g < 먼저 보낸 ' + fmt(sentC) + 'g');
      }
    });
    if (tooSmallC.length) {
      alert('⚠️ 입력값이 너무 작습니다!\n\n' + tooSmallC.join('\n') +
        '\n\n생산중량은 🚀먼저 보낸 것까지 포함한\n[총 생산량]을 입력해야 합니다.\n\n예) 먼저 2,000g 보내고 남은 게 3,000g이면\n→ 5,000 입력');
      return;
    }

    var missingWeight = items.filter(function(it) { return !it.weight || it.weight <= 0; });
    var missingLen    = items.filter(function(it) { return !it.chainLen || it.chainLen <= 0; });

    if (missingWeight.length > 0 || missingLen.length > 0) {
      var msg = '⚠️ 입력되지 않은 항목이 있습니다\n\n';
      if (missingWeight.length) msg += '· 생산중량 미입력 ' + missingWeight.length + '개\n';
      if (missingLen.length)    msg += '· 생산길이 미입력 ' + missingLen.length + '개\n';
      msg += '\n미입력 항목은 0으로 저장됩니다. 그래도 저장하시겠습니까?';
      showConfirmPopup(msg,
        function() { requirePin(function() { doSubmitProduce(items); }); },
        function() { return; }
      );
      return;
    }
    requirePin(function() {
      if (S.prodDiff && S.prodDiff.chainBad) {
        syncToSheet('updateDiff', {rowNum: items[0].no, mode:'chain', chainBad: S.prodDiff.chainBad});
      }
      doSubmitProduce(items);
    });

  } else {
    var weldItems = [];
    Object.keys(S.prodVals || {}).forEach(function(no) {
      if (S.prodVals[no] > 0) weldItems.push({no: no, weight: S.prodVals[no], chainLen: 0});
    });
    if (!weldItems.length) { toast('⚠️ 용접 후중량을 입력하세요', 2000, 'err'); return; }
    requirePin(function() {
      if (S.prodDiff && S.prodDiff.weldBad) {
        syncToSheet('updateDiff', {rowNum: weldItems[0].no, mode:'weld', weldBad: S.prodDiff.weldBad});
      }
      doSubmitProduce(weldItems);
    });
  }
}

async function doProcessEdit(row, changed) {
  showLoad();
  try {
    var fbFs = window._fbFirestore;
    var rowRef = fbFs.doc(window._db, 'rows', 'row_' + row.rowNum);
    await fbFs.updateDoc(rowRef, Object.assign({}, changed, {editTs: new Date().toISOString(), editBy: '\uad00\ub9ac\ubd80\uc218\uc815'}));

    // wireReal 수정 시 wireLots.left 동기화
    if (changed.wireReal !== undefined) {
      var wlId = String(row.rowNum) + '-W';
      try { await fbFs.updateDoc(fbFs.doc(window._db, 'wireLots', wlId), {left: changed.wireReal, claimed: changed.wireReal}); } catch(e) {}
      syncToSheet('updateWireReal', {meltNo: row.meltNo||'', wireType: row.wireType||'', wireReal: changed.wireReal, emp:'\uad00\ub9ac\ubd80\uc218\uc815'});
    }

    // chainProd/haeri 수정 시 chainLots 동기화
    if (changed.chainProd !== undefined || changed.haeri !== undefined) {
      var clId = String(row.rowNum) + '-W-C';
      var cu = {};
      if (changed.chainProd !== undefined) cu.left = changed.chainProd;
      if (changed.haeri !== undefined) cu.haeri = changed.haeri;
      try { await fbFs.updateDoc(fbFs.doc(window._db, 'chainLots', clId), cu); } catch(e) {}
    }

    syncToSheet('updateProcessEdit', Object.assign({rowNum: row.rowNum, meltNo: row.meltNo||'', emp:'\uad00\ub9ac\ubd80\uc218\uc815'}, changed));

    hideLoad();
    var labels = {wireReal:'\uc120\uc7ac\ud6c4\uc911\ub7c9', chainProd:'\uccb4\uc778\uc0dd\uc0b0', haeri:'\ud574\ub9ac', weldAfter:'\uc6a9\uc811\ud6c4\uc911\ub7c9'};
    var msg = Object.keys(changed).map(function(k){ return (labels[k]||k)+' '+fmt(changed[k])+'g'; }).join(', ');
    toast('\u2705 \uc218\uc815 \uc644\ub8cc: ' + msg, 2500, 'ok');
    openProcessEdit();
  } catch(e) {
    hideLoad();
    toast('\u274c \uc218\uc815 \uc2e4\ud328: ' + e.message, 2500, 'err');
  }
}

}

function renderShipListBody(keyword) {
  var wrap = document.getElementById('shipListWrap');
  if (!wrap) return;
  var list = SHIP_LIST.filter(function(x) {
    return !keyword || (x.customer||'').indexOf(keyword) >= 0;
  });
  if (!list.length) {
    wrap.innerHTML = '<div class="empty"><div class="eico">🚚</div><div class="etxt">출하 이력이 없습니다</div></div>';
    return;
  }
  var totW = 0, cnt = 0;
  list.forEach(function(x) { if (x.status !== '취소') { totW += parseFloat(x.weight)||0; cnt++; } });
  var h = '<div style="font-size:16px;color:#666;margin-bottom:10px">출하 <b>' + cnt + '</b>건 · 총 <b>' + fmt(totW) + 'g</b>' + (keyword ? ' (검색: ' + keyword + ')' : '') + '</div>';

  list.forEach(function(x) {
    var cancelled = (x.status === '취소');
    var badge = cancelled ? ' <span style="color:#c62828;font-weight:700">· 취소</span>' : '';
    var melt = x.meltNos ? '<div style="font-size:14px;color:#888;margin-top:4px">용해: ' + x.meltNos + '</div>' : '';
    var note = x.note ? '<div style="font-size:14px;color:#888;margin-top:2px">메모: ' + x.note + '</div>' : '';
    var qty  = (parseFloat(x.qty)||0) > 0 ? ' · ' + fmt(x.qty) + '개' : '';
    var btn = cancelled
      ? '<button class="invbtn rs" onclick="shipRestore(\'' + x.no + '\')">↩ 복구</button>'
      : '<button class="invbtn cx" onclick="shipCancel(\'' + x.no + '\')">🗑 취소</button>';
    h += '<div class="row-card" style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;padding:12px 14px;border-left-color:' + S.deptColor + (cancelled ? ';opacity:.5' : '') + '">' +
         '<div style="min-width:0;flex:1">' +
           '<div style="font-size:17px;font-weight:700;color:#333">' + x.no + ' · ' + (x.customer||'') + badge + '</div>' +
           '<div style="font-size:15px;color:#666;margin-top:3px">' + (x.shipDate||'') + ' · ' + (x.item||'') + ' · ' + fmt(x.weight) + 'g' + qty + ' · ' + (x.emp||'') + '</div>' +
           melt + note +
         '</div>' + btn + '</div>';
  });
  wrap.innerHTML = h;
}

// ── 입고 검수(선재/체인 공용) — 줄마다 측정중량 입력, 자재실 용해 입력과 동일 형태 ──
function openWireCheck()  { saveSession('wireCheck');  loadCheck('wire'); }
function openChainCheck() { saveSession('chainCheck'); loadCheck('chain'); }

async function loadCheck(kind) {
  S.checkKind = kind;
  S.screenMode = 'check';
  S.checkVals = {};
  showLoad();
  S.pendData = await fetchPending(kind);
  hideLoad();
  renderCheck();
  show('inpSc');
}

async function fetchPending(kind) {
  if (DEMO) { await sleep(250); return kind === 'chain' ? demoPendingChains() : demoPendingWires(); }
  var act = kind === 'chain' ? 'getPendingChains' : 'getPendingWires';
  try { var r = await apiGet(act, {}); return r.data || []; } catch(e) { return []; }
}

function pendSig(d) { return (d || []).map(function(x) { return x.no + ':' + x.claimed + ':' + x.status; }).join('|'); }

// 새 항목이 넘어오면 자동 갱신(입력 중인 측정값은 유지)
async function pollCheck() {
  if (S.screenMode !== 'check') return;
  if (!document.getElementById('inpSc').classList.contains('active')) return;
  var data = await fetchPending(S.checkKind);
  if (pendSig(data) === pendSig(S.pendData)) return;
  S.pendData = data;
  renderCheck();
  toast('🔄 새 항목 도착 · 목록 갱신', 1600, 'ok');
  // 브라우저 알림
  sendNotification(
    S.checkKind === 'chain' ? '⛓️ 체인 입고' : '📥 선재 입고',
    S.checkKind === 'chain' ? '기계실에서 체인이 넘어왔어요!' : '자재실에서 선재가 넘어왔어요!'
  );
}

// 브라우저 푸시 알림
function sendNotification(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    new Notification(title, {body: body, icon: '🏭'});
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(function(permission) {
      if (permission === 'granted') {
        new Notification(title, {body: body, icon: '🏭'});
      }
    });
  }
}

// 앱 시작시 알림 권한 요청
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function openCheckKP(no) {
  var x = S.pendMap[no]; if (!x) return;

  S.kpField = 'chk_' + no;
  S.kpVal = S.checkVals[no] ? String(S.checkVals[no]) : '';
  document.getElementById('kpLbl').textContent = size + ' · ' + no + ' / 측정중량(g)';
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
  document.getElementById('kpBg').classList.add('on');
  document.getElementById('kpSheet').classList.add('on');

function submitChecks() {
  var items = [];
  Object.keys(S.checkVals).forEach(function(no) {
    if (S.checkVals[no] > 0) items.push({no:no, checkWeight:S.checkVals[no]});
  });
  if (!items.length) { toast('⚠️ 측정중량을 1개 이상 입력하세요', 2000, 'err'); return; }
  requirePin(function() { doSubmitChecks(items); });
}

async function doSubmitChecks(items) {
  showLoad();
  var emp = S.user ? S.user.name : '미확인';
  var kind = S.checkKind;
  if (DEMO) { await sleep(500); hideLoad(); toast('✅ ' + items.length + '건 확인 (데모)', 1800, 'ok'); loadCheck(kind); return; }
  try {
    var act = kind === 'chain' ? 'confirmChains' : 'confirmWires';
    var r = await apiPost({action:act, items:items, empName:emp});
    hideLoad();
    if (r.success) {
      var msg = '✅ 활성화 ' + r.ok + '건';
      if (r.bad > 0) msg += ' · ⚠️ 불일치 ' + r.bad + '건(재확인)';
      // 구글 시트에 반영
      items.forEach(function(it) {
        var lotInfo = S.pendMap[it.no] || {};
        syncToSheet(kind === 'chain' ? 'updateChainLot' : 'updateWireLot', {
          no: it.no,
          rowNum: lotInfo.rowNum || '',
          meltNo: lotInfo.meltNo || lotInfo.melt || '',
          wtype: lotInfo.wtype || '',
          chainType: lotInfo.chainType || '',
          chainLen: lotInfo.chainLen || '',
          status: '사용가능',
          checkWeight: it.checkWeight,
          left: it.checkWeight,
          emp: emp
        });
      });
      toast(msg, 3500, r.bad > 0 ? 'err' : 'ok');
      loadCheck(kind);
    } else toast('❌ ' + (r.error || '실패'), 2500, 'err');
  } catch(e) { hideLoad(); toast('❌ 연결 오류', 2500, 'err'); }
}

// closeKP 함수에 order_ 필드 처리 추가를 위해 패치
var _origCloseKP = closeKP;
closeKP = function() {
  if (S.kpField && S.kpField.indexOf('order_') === 0) {
    var field = S.kpField.slice(6);
    var v = parseFloat(S.kpVal) || 0;
    G_ORDER[field] = v;
    var el = document.getElementById('ord_' + field);
    if (el) el.textContent = fmt(v);
    document.getElementById('kpBg').classList.remove('on');
    document.getElementById('kpSheet').classList.remove('on');
    return;
  }
  if (S.kpField && S.kpField.indexOf('addrow_') === 0) {
    var rfield = S.kpField.slice(7);
    var rv = S.kpVal;
    G_NEWROW[rfield] = isNaN(parseFloat(rv)) ? rv : parseFloat(rv);
    var rel = document.getElementById('nr_' + rfield);
    if (rel) rel.textContent = rfield.indexOf('Wt')>=0||rfield==='wirePlan' ? fmt(G_NEWROW[rfield])+'g' : (G_NEWROW[rfield]||'-');
    document.getElementById('kpBg').classList.remove('on');
    document.getElementById('kpSheet').classList.remove('on');
    return;
  }
  _origCloseKP();
};

async function submitOrder() {
  G_ORDER.meltNo = (document.getElementById('ord_meltNo').value||'').trim();
  G_ORDER.material = document.getElementById('ord_material').value;
  G_ORDER.content = document.getElementById('ord_content').value;

  if (!G_ORDER.rows.length) { toast('⚠️ 선재 라인을 1개 이상 추가하세요', 2000, 'err'); return; }
  requirePin(async function() {
    showLoad();
    try {
      var api = window._fbApi;
      var today = new Date().toISOString().split('T')[0];
      for (var i = 0; i < G_ORDER.rows.length; i++) {
        var r = G_ORDER.rows[i];
        var rowData = {
          date: today,
          meltNo: G_ORDER.meltNo,
          material: G_ORDER.material,
          content: G_ORDER.content,
          silver: G_ORDER.silver||0,
          alloy: G_ORDER.alloy||0,
          furnace: G_ORDER.furnace||0,
          scrapRecv: G_ORDER.scrapRecv||0,
          scrapUse: G_ORDER.scrapUse||0,
          scrapLeft: G_ORDER.scrapLeft||0,
          badWire: G_ORDER.badWire||0,
          wireType: r.wireType||'',
          wirePlan: r.wirePlan||0,
          chainType: r.chainType||'',
          chainLen: r.chainLen||'',
          chainWt: r.chainWt||0,
          wireReal:0, chainProd:0, haeri:0, weldAfter:0
        };
        // ① 구글 시트에 먼저 저장 → 시트 행번호 받기
        try {
          var sheetRes = await fetch(SCRIPT_URL, {
            method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'},
            body: JSON.stringify(Object.assign({action:'addRow'}, rowData))
          });
          var sheetData = await sheetRes.json();
          if (sheetData.rowNum) rowData.rowNum = sheetData.rowNum;
        } catch(e) {}
        // ② Firebase에 row_N 형태로 저장 (시트 행번호와 일치)
        await api.fbAddRow(rowData);
      }
      hideLoad();
      toast('✅ ' + G_ORDER.rows.length + '개 라인 등록 완료 · 자재실로 전달', 2500, 'ok');
      setTimeout(openInventory, 2000);
    } catch(e) { hideLoad(); toast('❌ 등록 실패: ' + e.message, 3000, 'err'); }
  });
}

// ═══════════════════════════════════════════════════════
// ★ 초기 세팅 (부서 비밀번호 · 작업자 등록)
// ═══════════════════════════════════════════════════════
async function openSetup() {
  show('setupSc');
  loadSetupData();
}

async function loadSetupData() {
  var body = document.getElementById('setupBody');
  body.innerHTML = '<div class="empty"><div class="eico">⏳</div><div class="etxt">로딩 중...</div></div>';
  try {
    var { getDocs, collection, doc, setDoc, deleteDoc } = window._fbFirestore || {};
    // 부서 비밀번호 로드
    var deptSnap = await getDocs(collection(window._db, 'depts'));
    var depts = {}; deptSnap.forEach(function(d){ depts[d.id]=d.data(); });
    // 직원 로드
    var empSnap = await getDocs(collection(window._db, 'employees'));
    var emps = []; empSnap.forEach(function(d){ emps.push({id:d.id,...d.data()}); });

    var deptList = [
      {code:'MGMT',name:'관리부',color:'#b71c1c'},
      {code:'MATERIAL',name:'자재실',color:'#2e7d32'},
      {code:'MACHINE',name:'기계실',color:'#1565c0'},
      {code:'WELD',name:'용접실',color:'#bf360c'},
      {code:'QUALITY',name:'품질부',color:'#6a1b9a'},
      {code:'GARANG',name:'가랑실',color:'#00695c'},
      {code:'ASSEMBLY',name:'조립실',color:'#e65100'},
      {code:'OUTSOURCE',name:'외주',color:'#546e7a'},
    ];

    var html = '<div class="inp-card"><div class="inp-label" style="margin-bottom:10px;font-size:19px;font-weight:800">🔑 부서 비밀번호 (4자리)</div>' +
      deptList.map(function(d){
        var pw = depts[d.code] ? depts[d.code].pw : '';
        return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0">' +
          '<div style="flex:1;font-size:20px;font-weight:800;color:' + d.color + '">' + d.name + '</div>' +
          '<input id="dpw_' + d.code + '" maxlength="4" style="width:90px;font-size:18px;font-weight:700;border:2px solid #ddd;border-radius:8px;padding:8px;text-align:center;outline:none" placeholder="0000" value="' + pw + '">' +
          '<button onclick="saveDeptPw(\'' + d.code + '\')" style="background:#1565c0;color:#fff;border:none;border-radius:8px;padding:9px 12px;font-size:17px;font-weight:700;cursor:pointer">저장</button>' +
        '</div>';
      }).join('') +
    '</div>' +

    '<div class="inp-card" style="margin-top:0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
      '<div style="font-size:19px;font-weight:800">👷 작업자 등록</div>' +
      '<button onclick="openAddEmp()" style="background:#2e7d32;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:17px;font-weight:700;cursor:pointer">+ 추가</button>' +
    '</div>' +
    (emps.length ? emps.map(function(e){
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0">' +
        '<div style="flex:1"><div style="font-size:16px;font-weight:700">' + e.name + '</div>' +
          '<div style="font-size:16px;color:#777">PIN: ' + e.pin + ' · ' + e.dept + '</div></div>' +
        '<button onclick="deleteEmp(\'' + e.id + '\')" style="background:#fde8e8;color:#c62828;border:none;border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer">삭제</button>' +
      '</div>';
    }).join('') : '<div style="color:#bbb;font-size:14px">등록된 작업자가 없습니다</div>') +
    '</div>';

    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = '<div class="empty"><div class="eico">❌</div><div class="etxt">로드 실패: ' + e.message + '</div></div>';
  }
}

async function saveDeptPw(code) {
  var pw = (document.getElementById('dpw_' + code).value||'').trim();
  if (pw.length !== 4 || isNaN(pw)) { toast('⚠️ 4자리 숫자를 입력하세요', 2000, 'err'); return; }
  try {
    var { doc, setDoc } = window._fbFirestore || {};
    await setDoc(doc(window._db, 'depts', code), {pw});
    toast('✅ ' + code + ' 비밀번호 저장', 1500, 'ok');
  } catch(e) { toast('❌ 저장 실패: ' + e.message, 2500, 'err'); }
}

var G_NEWEMP = {};
function openAddEmp() {
  var deptList = ['MGMT','MATERIAL','MACHINE','WELD','QUALITY','GARANG','ASSEMBLY','OUTSOURCE'];
  var s = document.getElementById('addRowSheet');
  s.innerHTML =
    '<div style="padding:18px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<div style="font-size:19px;font-weight:700">작업자 추가</div>' +
      '<button onclick="closeAddRow()" style="background:none;border:none;font-size:24px;color:#aaa;cursor:pointer">✕</button>' +
    '</div>' +
    '<div style="display:flex;flex-direction:column;gap:12px">' +
      '<div><div style="font-size:16px;color:#888;margin-bottom:6px">이름</div>' +
        '<input id="emp_name" style="width:100%;font-size:18px;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none" placeholder="홍길동"></div>' +
      '<div><div style="font-size:16px;color:#888;margin-bottom:6px">4자리 PIN</div>' +
        '<input id="emp_pin" type="number" maxlength="4" style="width:100%;font-size:22px;font-weight:700;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none" placeholder="1234"></div>' +
      '<div><div style="font-size:16px;color:#888;margin-bottom:6px">소속 부서</div>' +
        '<select id="emp_dept" style="width:100%;font-size:18px;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none">' +
          deptList.map(function(d){ return '<option value="' + d + '">' + d + '</option>'; }).join('') +
        '</select></div>' +
      '<button onclick="saveNewEmp()" style="width:100%;padding:16px;background:#2e7d32;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer">✅ 등록</button>' +
    '</div></div>';
  document.getElementById('addRowBg').classList.add('on');
  s.style.display = 'block';
}

async function saveNewEmp() {
  var name = (document.getElementById('emp_name').value||'').trim();
  var pin  = (document.getElementById('emp_pin').value||'').trim();
  var dept = document.getElementById('emp_dept').value;
  if (!name || pin.length !== 4) { toast('⚠️ 이름과 4자리 PIN을 입력하세요', 2000, 'err'); return; }
  try {
    var { collection, addDoc } = window._fbFirestore || {};
    await addDoc(collection(window._db, 'employees'), {name, pin, dept});
    closeAddRow();
    toast('✅ ' + name + ' 등록 완료', 1500, 'ok');
    loadSetupData();
  } catch(e) { toast('❌ 등록 실패: ' + e.message, 2500, 'err'); }
}

async function deleteEmp(id) {
  try {
    var { doc, deleteDoc } = window._fbFirestore || {};
    await deleteDoc(doc(window._db, 'employees', id));
    toast('🗑 삭제됨', 1200, 'ok');
    loadSetupData();
  } catch(e) { toast('❌ 삭제 실패', 2000, 'err'); }
}

</script>
