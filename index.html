<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;height:100vh;height:100dvh;overflow:hidden;touch-action:manipulation;user-select:none;}
.screen{display:none;height:100vh;height:100dvh;flex-direction:column;}

.home-group{display:flex;flex-direction:column;gap:10px;padding:8px 0;}
.home-row{display:grid;gap:10px;}
.home-row.r3{grid-template-columns:1fr 1fr 1fr;}
.home-row.r2{grid-template-columns:1fr 1fr;}
.dept-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border:none;border-radius:16px;padding:20px 10px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.08);min-height:100px;}
.dept-btn:active{transform:scale(.96);}
.dept-btn .ico{font-size:32px;margin-bottom:6px;}
.dept-btn .lbl{font-size:18px;font-weight:700;color:#111;}
.divline{height:1px;background:#e0e0e0;margin:2px 0;}
.pin-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;}
.pin-title{font-size:24px;font-weight:700;color:#111;}

.invbtn{flex-shrink:0;border:none;border-radius:9px;padding:12px 16px;font-size:17px;font-weight:700;cursor:pointer;}

</style>

<script type="module">
// в”Җв”Җ Firebase SDK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp, writeBatch }
                                                   from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiqr0ooR2s1Sps0hq0F5K9F1GoFm-HEoQ",
  authDomain: "factory-process.firebaseapp.com",
  projectId: "factory-process",
  storageBucket: "factory-process.firebasestorage.app",
  messagingSenderId: "1059311200802",
  appId: "1:1059311200802:web:c4bf4f20210230f445f87b"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

const DEMO = false;

// в”Җв”Җ Firestore н—¬нҚј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// кіөм • н–ү лӘ©лЎқ мқҪкё°
async function fbGetRows(dept) {
  const colRef = collection(db, 'rows');
  const snap = await getDocs(colRef);
  const rows = snap.docs.map(d => ({rowNum: d.id.replace('row_',''), docId: d.id, ...d.data()}));
  // лӮ м§ң лӮҙлҰјм°ЁмҲң м •л ¬ (JSм—җм„ң мІҳлҰ¬)
  rows.sort(function(a, b) { return (b.date||'').localeCompare(a.date||''); });
  return rows;
}

// л¶Җм„ң л№„л°ҖлІҲнҳё нҷ•мқё
async function fbVerifyDept(code, pw) {
  const ref = doc(db, 'depts', code);
  const snap = await getDoc(ref);
  if (!snap.exists()) return {success:false};
  const data = snap.data();
  const stored = String(data.PW || data.pw || '');
  return stored === String(pw) ? {success:true} : {success:false};
}

// мһ‘м—…мһҗ PIN нҷ•мқё
async function fbVerifyEmp(pin, dept) {
  // м „мІҙ м§Ғмӣҗ лӘ©лЎқ к°Җм ёмҷҖм„ң м•ұм—җм„ң л№„көҗ (мқёлҚұмҠӨ л¶Ҳн•„мҡ”)
  const snap = await getDocs(collection(db,'employees'));
  const pinStr = String(pin);
  for (const d of snap.docs) {
    const emp = d.data();
    if (String(emp.pin) === pinStr) {
      return {success:true, name:emp.name};
    }
  }
  return {success:false};
}

// м„ мһ¬ нӣ„мӨ‘лҹү м ҖмһҘ (лӢЁкұҙ)
async function fbSaveWire(rowNum, weight, empName) {
  const ref = doc(db, 'rows', 'row_' + rowNum);
  await updateDoc(ref, {wireReal: weight, wireEmp: empName, wireTs: serverTimestamp()});
  return {success:true};
}

// м„ мһ¬ нӣ„мӨ‘лҹү м ҖмһҘ (ліөмҲҳ)
async function fbSaveWires(items, empName) {
  const batch = writeBatch(db);
  items.forEach(it => {
    const ref = doc(db, 'rows', 'row_' + it.rowNum);
    batch.update(ref, {wireReal: it.weight, wireEmp: empName, wireTs: serverTimestamp()});
  });
  await batch.commit();
  // м„ мһ¬ лЎңнҠё мғқм„ұ (itemsм—җ row лҚ°мқҙн„° нҸ¬н•Ё)
  for (const it of items) {
    const lotNo = String(it.rowNum) + '-W';
    await setDoc(doc(db,'wireLots', lotNo), {
      no: lotNo,
      meltNo: it.meltNo||'',
      rowNum: it.rowNum,
      wtype: it.wireType||'',
      cont: it.content||'',
      mat: it.material||'',
      left: it.weight,
      chainType: it.chainType||'',
      chainLen: it.chainLen||'',
      chainWt: it.chainWt||0,
      status: 'кІҖмҲҳлҢҖкё°',
      claimed: it.weight,
      emp: empName,
      ts: serverTimestamp()
    }, {merge:true});
  }
  // л°ұк·ёлқјмҡҙл“ңлЎң кө¬кёҖ мӢңнҠём—җлҸ„ л°ҳмҳҒ
  for (const it of items) {
    const rowSnap2 = await getDoc(doc(db,'rows','row_' + it.rowNum));
    const row2 = rowSnap2.data() || {};
    syncToSheet('updateWireReal', {
      meltNo: row2.meltNo||'', wireType: row2.wireType||'',
      wireReal: it.weight, emp: empName
    });
    const lotNo2 = it.rowNum + '-W';
    syncToSheet('updateWireLot', {
      no: lotNo2, meltNo: row2.meltNo||'', wtype: row2.wireType||'',
      mat: row2.material||'', cont: row2.content||'',
      left: it.weight, chainType: row2.chainType||'',
      chainLen: row2.chainLen||'', chainWt: row2.chainWt||0,
      status: 'кІҖмҲҳлҢҖкё°', rowNum: it.rowNum, emp: empName
    });
  }
  return {success:true};
}

// м„ мһ¬ мһ…кі нҷ•мқё м ҖмһҘ
async function fbConfirmWires(items, empName) {
  let ok=0, bad=0;
  for (const it of items) {
    const ref = doc(db,'wireLots', it.no);
    const snap = await getDoc(ref);
    const claimed = snap.exists() ? (snap.data().claimed||0) : 0;
    const diff = Math.abs(it.checkWeight - claimed);
    const status = (claimed>0 && diff > claimed*0.05) ? 'л¶Ҳмқјм№ҳ' : 'мӮ¬мҡ©к°ҖлҠҘ';
    await updateDoc(ref, {status, checkWeight: it.checkWeight, checkEmp: empName, checkTs: serverTimestamp()});
    if (status==='мӮ¬мҡ©к°ҖлҠҘ') ok++; else bad++;
  }
  return {success:true, ok, bad};
}

// мІҙмқё мғқмӮ°мӨ‘лҹү мқјкҙ„ м ҖмһҘ
async function fbSaveChainsBatch(items, empName) {
  let made=0, haeriSum=0;
  for (const it of items) {
    const wRef = doc(db,'wireLots', it.no);
    const wSnap = await getDoc(wRef);
    const wire = wSnap.data()||{};
    const haeri = (wire.left||0) - it.weight;
    haeriSum += haeri;
    // м„ мһ¬ лЎңнҠё мғҒнғң м—…лҚ°мқҙнҠё
    await updateDoc(wRef, {status:'мӮ¬мҡ©лҗЁ', chainProd: it.weight, haeri, prodEmp: empName, prodTs: serverTimestamp()});
    // мІҙмқё лЎңнҠё мғқм„ұ
    const chainNo = it.no + '-C';
    await setDoc(doc(db,'chainLots', chainNo), {
      no: chainNo, wireNo: it.no, meltNo: wire.meltNo||'',
      chainType: wire.chainType||'', left: it.weight, haeri,
      chainLen: it.chainLen||0,
      status: 'кІҖмҲҳлҢҖкё°', claimed: it.weight, emp: empName, ts: serverTimestamp()
    }, {merge:true});
    // rows м—…лҚ°мқҙнҠё
    if (wire.rowNum) {
      await updateDoc(doc(db,'rows','row_' + wire.rowNum), {chainProd: it.weight, haeri, chainEmp: empName, chainTs: serverTimestamp()});
    }
    // л°ұк·ёлқјмҡҙл“ңлЎң кө¬кёҖ мӢңнҠём—җлҸ„ л°ҳмҳҒ
    syncToSheet('updateChainLot', {
      no: chainNo, meltNo: wire.meltNo||'',
      chainType: wire.chainType||'', left: it.weight,
      haeri, chainLen: it.chainLen||0,
      status: 'кІҖмҲҳлҢҖкё°', emp: empName
    });
    made++;
  }
  return {success:true, made, haeriSum};
}

// мҡ©м ‘ нӣ„мӨ‘лҹү мқјкҙ„ м ҖмһҘ
async function fbSaveWeldsBatch(items, empName) {
  let made=0, incSum=0;
  for (const it of items) {
    const cRef = doc(db,'chainLots', it.no);
    const cSnap = await getDoc(cRef);
    const chain = cSnap.data()||{};
    const inc = it.weight - (chain.left||0);
    incSum += inc;
    await updateDoc(cRef, {status:'мӮ¬мҡ©лҗЁ', weldAfter: it.weight, inc, weldEmp: empName, weldTs: serverTimestamp()});
    // мҡ©м ‘ мқҙл Ҙ кё°лЎқ
    const weldNo = it.no + '-Z';
    await setDoc(doc(db,'welds', weldNo), {
      no: weldNo, chainNo: it.no, meltNo: chain.meltNo||'',
      weld: it.weight, inc, emp: empName, ts: serverTimestamp()
    }, {merge:true});
    // л°ұк·ёлқјмҡҙл“ңлЎң кө¬кёҖ мӢңнҠём—җлҸ„ л°ҳмҳҒ
    syncToSheet('updateWeldLog', {
      no: weldNo, chainNo: it.no, meltNo: chain.meltNo||'',
      weld: it.weight, inc, left: chain.left||0, emp: empName
    });
    made++;
  }
  return {success:true, made, incSum};
}

// мһ¬кі  нҳ„нҷ©
async function fbGetInventory() {
  const [wSnap, cSnap, zSnap] = await Promise.all([

    welds:  zSnap.docs.map(d=>d.data())
  };
}

async function sheetGet(action, params) {

}

async function openList(mode) {
  S.inpMode = mode;
  var titles = {wire:'мҡ©н•ҙ л“ұлЎқ лӘ©лЎқ', chain:'мІҙмқё мғқмӮ° лӘ©лЎқ', weld:'мҡ©м ‘ лӘ©лЎқ', view:'мҳӨлҠҳ мғқмӮ°нҳ„нҷ©'};
  document.getElementById('listTitle').textContent = titles[mode] || 'лӘ©лЎқ';
  document.getElementById('listHdr').style.background = S.deptColor;
  var _lkb = document.getElementById('listBack'); _lkb.onclick = goHome; _lkb.textContent = 'вҶҗ нҷҲ';
  showLoad();

  if (DEMO) { await sleep(400); S.rows = demoRows(); }
  else {
    try { var r = await apiGet('getRows', {dept:S.dept}); S.rows = r.data || []; }
    catch(e) { S.rows = demoRows(); }
  }
  hideLoad();

  var filtered = S.rows.filter(function(r) {
    if (mode === 'wire')  return !r.wireReal;
    if (mode === 'chain') return r.wireReal && !r.chainProd;
    if (mode === 'weld')  return r.chainProd && !r.weldAfter;
    return true;
  });

  var body = document.getElementById('listBody');
  body.innerHTML = '';
  if (!filtered.length) {
    body.innerHTML = '<div class="empty"><div class="eico">рҹ“ӯ</div><div class="etxt">нҳ„мһ¬ мһ…л Ҙн•  н•ӯлӘ©мқҙ м—ҶмҠөлӢҲлӢӨ</div></div>';
    show('listSc'); return;
  }

  if (mode === 'wire') {
    // мҡ©н•ҙлІҲнҳёлі„ л¬¶мқҢ вҖ” лӮЁмқҖ(лҜёмҷ„м„ұ) м„ мһ¬л§Ң м№ҙл“ңлЎң, м§„н–үнҳ„нҷ©мқҖ м „мІҙ кё°мӨҖ
    var groups = {};
    var groupOrder = [];
    filtered.forEach(function(row) {
      if (!groups[row.meltNo]) { groups[row.meltNo] = []; groupOrder.push(row.meltNo); }
      groups[row.meltNo].push(row);
    });
    groupOrder.forEach(function(meltNo) {
      var remainRows = groups[meltNo];
      var allRows = S.rows.filter(function(r) { return r.meltNo === meltNo; });
      var total = allRows.length;
      var doneRows = allRows.filter(function(r) { return r.wireReal; });
      var done = doneRows.length;
      var remain = total - done;
      var first = remainRows[0];

      // м„ мһ¬мў…лҘҳ В· мҳҲмғҒмӨ‘лҹү В· нӣ„мӨ‘лҹү н•ң мӨ„, м—°н•ң мӢӨм„  кө¬л¶„
      var headHtml =
        '<div style="display:flex;gap:14px;padding:3px 0 5px;font-size:11px;color:#aaa;font-weight:600">' +
          '<span style="flex:0 0 96px">м„ мһ¬мў…лҘҳ</span>' +
          '<span style="flex:0 0 70px;text-align:right">мҳҲмғҒмӨ‘лҹү</span>' +
          '<span style="flex:0 0 70px;text-align:right">нӣ„мӨ‘лҹү</span>' +
        '</div>';
      var rowsHtml = allRows.map(function(r) {
        var doneRow = !!r.wireReal;
        var realTxt = doneRow
          ? '<span style="color:#2e7d32;font-weight:700">' + fmt(r.wireReal) + 'g</span>'
          : '<span style="color:#cfcfcf">вҖ”</span>';
        var nameTxt = (doneRow ? 'вң… ' : '') + (r.wireType||'-');
        return '<div style="display:flex;gap:14px;align-items:baseline;padding:7px 0;border-bottom:1px solid #f1f1f1' + (doneRow ? ';opacity:.6' : '') + '">' +
            '<span style="flex:0 0 96px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + nameTxt + '</span>' +
            '<span style="flex:0 0 70px;text-align:right;color:#1565c0;font-weight:700">' + fmt(r.wirePlan) + 'g</span>' +
            '<span style="flex:0 0 70px;text-align:right">' + realTxt + '</span>' +
          '</div>';
      }).join('');

      var card = document.createElement('div');
      card.className = 'row-card';
      card.style.borderLeftColor = S.deptColor;
      card.innerHTML =
        '<span class="row-arrow">вҖә</span>' +
        '<div class="row-title">' + meltNo + '</div>' +
        '<div class="row-sub">' + (first.material||'') + ' ' + (first.content||'-') + '%</div>' +
        '<div style="font-size:20px;font-weight:700;margin:8px 0 10px">мҙқ <b>' + total + '</b>мў… &nbsp;В·&nbsp; <span style="color:#2e7d32">мҷ„м„ұ <b>' + done + '</b></span> &nbsp;В·&nbsp; <span style="color:#1565c0">лӮЁмқҢ <b>' + remain + '</b></span></div>' +
        headHtml + rowsHtml;
      card.onclick = function() { openWireGroupInp(meltNo, remainRows); };
      body.appendChild(card);
    });
  } else {
    filtered.forEach(function(row) {
      var card = document.createElement('div');
      card.className = 'row-card';
      card.style.borderLeftColor = S.deptColor;
      card.innerHTML = buildCard(row, mode);
      if (mode !== 'view') {
        card.onclick = function() { S.selRow = row; openInp(mode, row); };
      }
      body.appendChild(card);
    });
  }
  show('listSc');

  // 30мҙҲл§ҲлӢӨ мһҗлҸҷ мғҲлЎңкі м№Ё (кө¬кёҖ мӢңнҠё мғҲ н–ү мһҗлҸҷ л°ҳмҳҒ)
  if (S._listPollTimer) clearInterval(S._listPollTimer);
  S._listPollTimer = setInterval(async function() {
    var listSc = document.getElementById('listSc');
    if (!listSc || !listSc.classList.contains('active')) {
      clearInterval(S._listPollTimer); return;
    }
    try {
      var r = await apiGet('getRows', {dept: S.dept});
      var newRows = r.data || [];
      if (newRows.length !== S.rows.length) {
        S.rows = newRows;
        renderListBody(S.inpMode);
        toast('рҹ”„ мғҲ мһ‘м—…кі„нҡҚмқҙ м¶”к°Җлҗҗм–ҙмҡ”!', 2000, 'ok');
      }
    } catch(e) {}
  }, 15000);


}

function buildCard(r, mode) {
  if (mode === 'wire') {
    return '<span class="row-arrow">вҖә</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.wireType||'-') + ' &nbsp;|&nbsp; ' + (r.material||'') + ' ' + (r.content||'-') + '%</div>' +
      '<div class="row-info">' +
        'мҲңмқҖ <b>' + fmt(r.silver) + 'g</b>&nbsp;&nbsp; м•ҢлЎңмқҙ <b>' + fmt(r.alloy) + 'g</b>&nbsp;&nbsp; м—°мЈјлЎң <b>' + fmt(r.furnace) + 'g</b><br>' +
        'мһ¬л§җмҲҳл № <b>' + fmt(r.scrapRecv) + 'g</b>&nbsp;&nbsp; мһ¬л§җнҲ¬мһ… <b>' + fmt(r.scrapUse) + 'g</b>&nbsp;&nbsp; мһ¬л§җмһ”лҹү <b>' + fmt(r.scrapLeft) + 'g</b><br>' +
        'л¶Ҳлҹүм„ мһ¬ <b>' + fmt(r.badWire) + 'g</b>&nbsp;&nbsp; мҳҲмғҒмӨ‘лҹү <b style="color:#1565c0;font-size:20px">' + fmt(r.wirePlan) + 'g</b>' +
      '</div>';
  }
  if (mode === 'chain') {
    return '<span class="row-arrow">вҖә</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.chainType||'-') + ' &nbsp;|&nbsp; ' + (r.wireType||'-') + '</div>' +
      '<div class="row-info">' +
        'м„ мһ¬нӣ„мӨ‘лҹү <b style="color:#2e7d32;font-size:20px">' + fmt(r.wireReal) + 'g</b>&nbsp;&nbsp; кі„нҡҚ <b>' + fmt(r.chainPlan) + 'g</b>' +
      '</div>';
  }
  if (mode === 'weld') {
    return '<span class="row-arrow">вҖә</span>' +
      '<div class="row-title">' + r.meltNo + '</div>' +
      '<div class="row-sub">' + (r.chainType||'-') + '</div>' +
      '<div class="row-info">' +
        'мІҙмқёмғқмӮ° <b style="font-size:20px">' + fmt(r.chainProd) + 'g</b>&nbsp;&nbsp; н•ҙлҰ¬ <b style="color:#e53935;font-size:20px">' + fmt(r.haeri) + 'g</b>' +
      '</div>';
  }
  var step = r.weldAfter ? 'вң… мҡ©м ‘мҷ„лЈҢ' : r.chainProd ? 'вҡҷпёҸ кё°кі„мҷ„лЈҢ' : r.wireReal ? 'вҡ—пёҸ м„ мһ¬мҷ„лЈҢ' : 'рҹ“Ӣ лҢҖкё°';
  return '<div class="row-title">' + r.meltNo + ' вҖ” ' + (r.wireType||'') + '</div>' +
    '<div class="row-sub">' + (r.material||'') + ' ' + (r.content||'-') + '% &nbsp;|&nbsp; ' + step + '</div>' +
    '<div class="row-info">' +
      'м„ мһ¬ <b>' + fmt(r.wireReal) + 'g</b> вҶ’ мІҙмқё <b>' + fmt(r.chainProd) + 'g</b> вҶ’ н•ҙлҰ¬ <b style="color:#e53935">' + fmt(r.haeri) + 'g</b> вҶ’ мҡ©м ‘нӣ„ <b>' + fmt(r.weldAfter) + 'g</b>' +
    '</div>';
}

function openKPWireByNum(rowNum) {
  var row = G_WIRE_ROWS[rowNum];
  var label = row ? (row.wireType || 'м„ мһ¬') : 'м„ мһ¬';
  openKPWire(rowNum, label);
}
function openKPWire(rowNum, label) {
  S.kpField = 'ww_' + rowNum;
  S.kpVal = S.fields.wireWeights[rowNum] ? String(S.fields.wireWeights[rowNum]) : '';
  document.getElementById('kpLbl').textContent = label + ' мӢӨмӨ‘лҹү (g)';
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
  document.getElementById('kpBg').classList.add('on');
  document.getElementById('kpSheet').classList.add('on');
}

async function doSaveWireGroup(rows) {
  var emp = S.user ? S.user.name : 'лҜёнҷ•мқё';
  var meltNo = rows[0].meltNo;
  var items = rows.map(function(row) {
    return {
      rowNum: row.rowNum,
      weight: S.fields.wireWeights[row.rowNum] || 0,
      meltNo: row.meltNo||'', wireType: row.wireType||'',
      material: row.material||'', content: row.content||'',
      chainType: row.chainType||'', chainLen: row.chainLen||'', chainWt: row.chainWt||0
    };
  }).filter(function(it) { return it.weight > 0; });
  if (!items.length) { toast('вҡ пёҸ мһ…л Ҙлҗң мӢӨмӨ‘лҹүмқҙ м—ҶмҠөлӢҲлӢӨ', 2000, 'err'); return; }

  // м°Ёмқҙк°’ нҸ¬н•Ё
  var badWireOut = S.fields.badWireOut || 0;
  var scrapOut   = S.fields.scrapOut   || 0;

  showLoad();
  if (DEMO) {
    await sleep(250); hideLoad();
    applyWireLocal(items);
    toast('вң… м ҖмһҘ мҷ„лЈҢ (лҚ°лӘЁ)', 1500, 'ok');
    afterWireSave(meltNo); return;
  }
  try {
    var r = await apiPost({action:'saveWires', empName:emp, items:items});
    hideLoad();
    if (r.success) {
      applyWireLocal(items);
      // м°Ёмқҙк°’ кө¬кёҖ мӢңнҠё л°ҳмҳҒ
      if (badWireOut || scrapOut) {
        items.forEach(function(it) {
          syncToSheet('updateDiff', {
            rowNum: it.rowNum,
            mode: 'wire',
            badWire: badWireOut,
            scrapOut: scrapOut,
            emp: emp
          });
        });
      }
      toast('вң… м ҖмһҘ мҷ„лЈҢ В· кё°кі„мӢӨлЎң м „лӢ¬лҗЁ', 1600, 'ok');
      afterWireSave(meltNo);
    } else {
      toast('вқҢ м ҖмһҘ мӢӨнҢЁ: ' + (r.error||''), 2500, 'err');
    }
  } catch(e) { hideLoad(); toast('вқҢ м—°кІ° мҳӨлҘҳ', 2500, 'err'); }
}

// л°©кёҲ м ҖмһҘн•ң к°’мқ„ лЎңм»¬ лҚ°мқҙн„°м—җ мҰүмӢң л°ҳмҳҒ
function applyWireLocal(items) {
  items.forEach(function(it) {
    for (var i = 0; i < S.rows.length; i++) {
      if (S.rows[i].rowNum === it.rowNum) { S.rows[i].wireReal = it.weight; break; }
    }
  });
}

// м ҖмһҘ нӣ„ мһ…л Ҙ нҷ”л©ҙм—җ к·ёлҢҖлЎң лЁёл¬ҙлҰ„(лӮЁмқҖ м„ мһ¬л§Ң лӢӨмӢң н‘ңмӢң)
function afterWireSave(meltNo) {
  var remain = S.rows.filter(function(r) { return r.meltNo === meltNo && !r.wireReal; });
  if (remain.length) {
    openWireGroupInp(meltNo, remain);
  } else {
    toast('вң… мқҙ мҡ©н•ҙ м„ мһ¬ мһ…л Ҙ мҷ„лЈҢ', 1800, 'ok');
    openList('wire');
  }
}

function openInp(mode, row) {

  document.getElementById('inpHdr').style.background = S.deptColor;

  S.fields = {weight: 0};

  var lbl = mode === 'wire' ? 'м„ мһ¬ нӣ„мӨ‘лҹү (g)' : mode === 'chain' ? 'мІҙмқё мғқмӮ°мӨ‘лҹү (g)' : 'мҡ©м ‘ нӣ„мӨ‘лҹү (g)';

        '<div class="inp-card"><div class="inp-label">мһ¬м§Ҳ</div><div class="inp-val">' + (row.material||'-') + '</div></div>' +
        '<div class="inp-card"><div class="inp-label">н•Ёлҹү</div><div class="inp-val">' + (row.content||'-') + '%</div></div>' +
      '</div>' +
      '<div class="inp-card"><div class="inp-label">м„ мһ¬ мў…лҘҳ</div><div class="inp-val">' + (row.wireType||'-') + '</div></div>' +

async function doSave(mode) {
  showLoad();
  var emp = S.user ? S.user.name : 'лҜёнҷ•мқё';
  var row = S.selRow;
  var payload = {empName:emp, rowNum:row.rowNum, weight:S.fields.weight};

  // м°Ёмқҙк°’ м¶”к°Җ
  if (mode === 'wire') {
    payload.badWire  = S.fields.badWire  || 0;
    payload.scrapOut = S.fields.scrapOut || 0;
  } else if (mode === 'chain') {
    payload.chainBad = S.fields.chainBad || 0;
    // н•ҙлҰ¬ мһҗлҸҷкі„мӮ°
    payload.haeri = (row.wireReal || 0) - (S.fields.weight || 0);
  } else if (mode === 'weld') {
    payload.weldBad = S.fields.weldBad || 0;
    // мҡ©м ‘ мҰқк°Җлҹү мһҗлҸҷкі„мӮ°
    payload.weldInc = (S.fields.weight || 0) - (row.chainProd || 0);
  }

  var msg = 'вң… м ҖмһҘ мҷ„лЈҢ';
  if (DEMO) { await sleep(600); hideLoad(); toast(msg + ' (лҚ°лӘЁ)', 3000, 'ok'); setTimeout(goMenu, 2200); return; }
  try {
    var action = mode === 'wire' ? 'saveWire' : mode === 'chain' ? 'saveChain' : 'saveWeld';
    payload.action = action;
    var r = await apiPost(payload);
    hideLoad();
    if (r.success) {
      // м°Ёмқҙк°’ кө¬кёҖ мӢңнҠём—җ л°ҳмҳҒ
      if (mode === 'wire' && (payload.badWire || payload.scrapOut)) {
        syncToSheet('updateDiff', {rowNum:row.rowNum, mode:'wire', badWire:payload.badWire, scrapOut:payload.scrapOut, emp:emp});
      } else if (mode === 'chain' && payload.haeri) {
        syncToSheet('updateDiff', {rowNum:row.rowNum, mode:'chain', haeri:payload.haeri, chainBad:payload.chainBad||0, emp:emp});
      } else if (mode === 'weld' && payload.weldInc) {
        syncToSheet('updateDiff', {rowNum:row.rowNum, mode:'weld', weldInc:payload.weldInc, weldBad:payload.weldBad||0, emp:emp});
      }
      // Firebase rows м—…лҚ°мқҙнҠё
      var diffData = {};
      if (mode === 'wire')  { diffData.badWireOut = payload.badWire||0; diffData.scrapOut = payload.scrapOut||0; }
      if (mode === 'chain') { diffData.haeri = payload.haeri||0; diffData.chainBad = payload.chainBad||0; }
      if (mode === 'weld')  { diffData.weldInc = payload.weldInc||0; diffData.weldBad = payload.weldBad||0; }
      if (Object.keys(diffData).length) {
        try { await window._fbApi.fbUpdateRow(row.rowNum, diffData); } catch(e) {}
      }
      toast(msg, 3000, 'ok');
      setTimeout(goMenu, 2200);
    }
    else toast('вқҢ м ҖмһҘ мӢӨнҢЁ: ' + (r.error||''), 3000, 'err');
  } catch(e) { hideLoad(); toast('вқҢ м—°кІ° мҳӨлҘҳ', 3000, 'err'); }
}

function buildKpGrid() {
  var g = document.getElementById('kpGrid');
  ['1','2','3','4','5','6','7','8','9','del','0','.'].forEach(function(k) {
    var b = document.createElement('button');
    b.className = 'nk' + (k === 'del' ? ' del' : '');
    b.textContent = k === 'del' ? 'вҢ«' : k;
    b.ontouchstart = function(e) { e.preventDefault(); kpPress(k); };
    b.onclick = function() { kpPress(k); };
    g.appendChild(b);
  });
  var ok = document.createElement('button');
  ok.className = 'nk ok kp-ok'; ok.textContent = 'вң“ нҷ•мқё (Enter)';
  ok.ontouchstart = function(e) { e.preventDefault(); closeKP(); };
  ok.onclick = closeKP;
  g.appendChild(ok);

  // вҳ… PC нӮӨліҙл“ң мһ…л Ҙ м§Җмӣҗ (мҲ«мһҗнӮӨнҢЁл“ң + лЎңк·ёмқёPIN + лӢҙлӢ№мһҗPIN)
  document.addEventListener('keydown', function(e) {
    var kpSheet  = document.getElementById('kpSheet');
    var loginSc  = document.getElementById('loginSc');
    var pinOvl   = document.getElementById('pinOvl');

    // мҲ«мһҗ нӮӨнҢЁл“ң (мӨ‘лҹү мһ…л Ҙ)
    if (kpSheet && kpSheet.classList.contains('on')) {
      if (e.key >= '0' && e.key <= '9') { kpPress(e.key); e.preventDefault(); }
      else if (e.key === '.') { kpPress('.'); e.preventDefault(); }
      else if (e.key === 'Backspace') { kpPress('del'); e.preventDefault(); }
      else if (e.key === 'Enter') { closeKP(); e.preventDefault(); }
      else if (e.key === 'Escape') { cancelKP(); e.preventDefault(); }
      return;
    }

    // л¶Җм„ң лЎңк·ёмқё PIN
    if (loginSc && loginSc.classList.contains('active')) {
      if (e.key >= '0' && e.key <= '9') { loginKey(e.key); e.preventDefault(); }
      else if (e.key === 'Backspace') { loginKey('del'); e.preventDefault(); }
      else if (e.key === 'Enter') { loginKey('ok'); e.preventDefault(); }
      return;
    }

    // лӢҙлӢ№мһҗ PIN (м ҖмһҘ нҷ•мқё)
    if (pinOvl && pinOvl.classList.contains('on')) {
      if (e.key >= '0' && e.key <= '9') { pinKey(e.key); e.preventDefault(); }
      else if (e.key === 'Backspace') { pinKey('del'); e.preventDefault(); }
      else if (e.key === 'Enter') { pinKey('ok'); e.preventDefault(); }
      else if (e.key === 'Escape') { closePinOvl(); e.preventDefault(); }
      return;
    }
  });
}
function fmtKp(v) {
  var parts = (v || '0').split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}
function kpPress(k) {
  if (k === 'del') S.kpVal = S.kpVal.slice(0,-1);
  else if (k === '.') { if (!S.kpVal.includes('.')) S.kpVal += '.'; }
  else if (S.kpVal.length < 9) S.kpVal += k;
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
}
function openKP(field, label) {
  S.kpField = field; S.kpVal = S.fields[field] ? String(S.fields[field]) : '';
  document.getElementById('kpLbl').textContent = label;
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
  document.getElementById('kpBg').classList.add('on');
  document.getElementById('kpSheet').classList.add('on');
}
function hideKpSheet() {
  document.getElementById('kpBg').classList.remove('on');
  document.getElementById('kpSheet').classList.remove('on');
}
function cancelKP() { hideKpSheet(); }   // к°’ л°ҳмҳҒ м—Ҷмқҙ лӢ«кё° вҖ” 'вң“нҷ•мқё'мқ„ лҲҢлҹ¬м•јл§Ң мһ…л Ҙ л°ҳмҳҒ
function closeKP() {
  var v = parseFloat(S.kpVal) || 0;
  if (S.kpField.indexOf('chk_') === 0) {            // кё°кі„мӢӨ мёЎм •мӨ‘лҹү вҶ’ н•„л“ңм—җ н‘ңмӢң
    var cno = S.kpField.slice(4);
    var px = S.pendMap[cno];
    var claimed = px ? (parseFloat(px.claimed) || 0) : 0;
    if (v > 0 && claimed > 0 && Math.abs(v - claimed) > claimed * 0.05) {
      hideKpSheet();
      var src = (S.checkKind === 'chain') ? 'кё°кі„мӢӨ' : 'мһҗмһ¬мӢӨ';
      toast('рҹҡ« ' + src + ' мӢ кі  ' + fmt(claimed) + 'g В· мёЎм • ' + fmt(v) + 'g вҖ” 5% мҙҲкіј, лӢӨмӢң мёЎм •н•ҳм„ёмҡ”', 4200, 'err');
      return;
    }
    S.checkVals[cno] = v;
    var ce = document.getElementById('chk_' + cno);
    if (ce) ce.textContent = fmt(v);
    hideKpSheet();
    return;
  }
  if (S.kpField.indexOf('prodDiff_') === 0) {      // мІҙмқё/мҡ©м ‘ м°Ёмқҙк°’ мһ…л Ҙ
    var dfield = S.kpField.slice(9);
    var dv = parseFloat(S.kpVal) || 0;
    if (!S.prodDiff) S.prodDiff = {};
    S.prodDiff[dfield] = dv;
    var del = document.getElementById('v_' + (dfield === 'chainBad' ? 'chainBad2' : 'weldBad2'));
    if (del) del.textContent = dv;
    hideKpSheet(); return;
  }
  if (S.kpField.indexOf('prodLen_') === 0) {        // мІҙмқё кёёмқҙ мһ…л Ҙ
    var no = S.kpField.slice(8);
    var v = parseFloat(S.kpVal) || 0;
    if (!S.prodLens) S.prodLens = {};
    S.prodLens[no] = v;
    var el = document.getElementById('pl_' + no);
    if (el) el.textContent = v || 0;
    hideKpSheet(); return;
  }
  if (S.kpField.indexOf('prod_') === 0) {           // мІҙмқё мғқмӮ°мӨ‘лҹү/мҡ©м ‘ нӣ„мӨ‘лҹү(н•„л“ң н‘ңмӢң)
    var pno = S.kpField.slice(5);
    S.prodVals[pno] = v;
    var pce = document.getElementById('pv_' + pno);
    if (pce) pce.textContent = fmt(v);
    hideKpSheet();
    return;
  }
  if (S.kpField.indexOf('use_') === 0) {            // лЎңнҠё нҲ¬мһ… мӮ¬мҡ©лҹү
    var no = S.kpField.slice(4);
    var lot = S.availMap[no];
    if (v <= 0) { delete S.basket[no]; }
    else { if (lot && v > lot.left) v = lot.left; S.basket[no] = {lot:lot, used:v}; }
    hideKpSheet(); renderLotAvail(); renderBasket(); return;
  }
  if (S.kpField === 'prodWeight') {                 // мІҙмқёмғқмӮ°/мҡ©м ‘нӣ„мӨ‘лҹү
    S.fields.prodWeight = v; hideKpSheet(); renderBasket(); return;
  }
  if (S.kpField.indexOf('ww_') === 0) {
    var rowNum = parseInt(S.kpField.replace('ww_', ''));
    if (S.fields.wireWeights) S.fields.wireWeights[rowNum] = v;
    var el = document.getElementById(S.kpField);
    if (el) el.textContent = fmt(v);
  } else {
    S.fields[S.kpField] = v;
    var el2 = document.getElementById('v_' + S.kpField);
    if (el2) el2.textContent = fmt(v);
  }
  hideKpSheet();
}

async function apiGet(action, params) {
  var api = window._fbApi;
  // лӘЁл‘җ Firebase (л№ лҘё мҶҚлҸ„) - м„Өм •мқҖ кө¬кёҖмӢңнҠё мҲҳм • нӣ„ лҸҷкё°нҷ” лІ„нҠјмңјлЎң л°ҳмҳҒ
  if (action === 'verifyDept')       return api.fbVerifyDept(params.code, params.pw);
  if (action === 'verifyEmp')        return api.fbVerifyEmp(params.pin, params.dept);
  if (action === 'getRows')          return { data: await api.fbGetRows(params.dept||'') };
  if (action === 'getPendingWires')  return { data: await api.fbGetPendingWires() };
  if (action === 'getPendingChains') return { data: await api.fbGetPendingChains() };
  if (action === 'getWireLots')      return { data: await api.fbGetWireLots() };
  if (action === 'getChainLots')     return { data: await api.fbGetChainLots() };
  if (action === 'getInventory')     return api.fbGetInventory();
  throw new Error('Unknown action: ' + action);
}
async function apiPost(data) {
  var api = window._fbApi;
  var act = data.action;
  if (act === 'saveWire')        return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'saveWires')       return api.fbSaveWires(data.items, data.empName);
  if (act === 'saveChain')       return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'saveWeld')        return api.fbSaveWire(data.rowNum, data.weight, data.empName);
  if (act === 'confirmWires')    return api.fbConfirmWires(data.items, data.empName);
  if (act === 'confirmChains')   return api.fbConfirmChains(data.items, data.empName);
  if (act === 'saveChainsBatch') return api.fbSaveChainsBatch(data.items, data.empName);
  if (act === 'saveWeldsBatch')  return api.fbSaveWeldsBatch(data.items, data.empName);
  if (act === 'cancelLot')       return api.fbCancelLot(data.kind, data.no, data.restore);
  throw new Error('Unknown action: ' + act);
}

function submitProduce() {
  var isChain = S.lotKind === 'chain';

  if (isChain) {
    var allNos = Object.keys(S.prodVals || {}).concat(Object.keys(S.prodLens || {}));
    var uniqueNos = allNos.filter(function(v, i, a) { return a.indexOf(v) === i; });
    var items = [];
    uniqueNos.forEach(function(no) {
      var w = (S.prodVals && S.prodVals[no]) || 0;
      var l = (S.prodLens && S.prodLens[no]) || 0;
      if (w > 0 || l > 0) items.push({no: no, weight: w, chainLen: l});
    });
    if (!items.length) { toast('вҡ пёҸ мғқмӮ°мӨ‘лҹү лҳҗлҠ” кёёмқҙлҘј мһ…л Ҙн•ҳм„ёмҡ”', 2000, 'err'); return; }

    var missingWeight = items.filter(function(it) { return !it.weight || it.weight <= 0; });
    var missingLen    = items.filter(function(it) { return !it.chainLen || it.chainLen <= 0; });

    if (missingWeight.length > 0 || missingLen.length > 0) {
      var msg = 'вҡ пёҸ мһ…л Ҙлҗҳм§Җ м•ҠмқҖ н•ӯлӘ©мқҙ мһҲмҠөлӢҲлӢӨ\n\n';
      if (missingWeight.length) msg += 'В· мғқмӮ°мӨ‘лҹү лҜёмһ…л Ҙ ' + missingWeight.length + 'к°ң\n';
      if (missingLen.length)    msg += 'В· мғқмӮ°кёёмқҙ лҜёмһ…л Ҙ ' + missingLen.length + 'к°ң\n';
      msg += '\nлҜёмһ…л Ҙ н•ӯлӘ©мқҖ 0мңјлЎң м ҖмһҘлҗ©лӢҲлӢӨ. к·ёлһҳлҸ„ м ҖмһҘн•ҳмӢңкІ мҠөлӢҲк№Ң?';
      showConfirmPopup(msg,
        function() { requirePin(function() { doSubmitProduce(items); }); },
        function() { return; }
      );
      return;
    }
    requirePin(function() {
      if (S.prodDiff && S.prodDiff.chainBad) {
        syncToSheet('updateDiff', {rowNum: items[0].no, mode:'chain', chainBad: S.prodDiff.chainBad});
      }
      doSubmitProduce(items);
    });

  } else {
    var weldItems = [];
    Object.keys(S.prodVals || {}).forEach(function(no) {
      if (S.prodVals[no] > 0) weldItems.push({no: no, weight: S.prodVals[no], chainLen: 0});
    });
    if (!weldItems.length) { toast('вҡ пёҸ мҡ©м ‘ нӣ„мӨ‘лҹүмқ„ мһ…л Ҙн•ҳм„ёмҡ”', 2000, 'err'); return; }
    requirePin(function() {
      if (S.prodDiff && S.prodDiff.weldBad) {
        syncToSheet('updateDiff', {rowNum: weldItems[0].no, mode:'weld', weldBad: S.prodDiff.weldBad});
      }
      doSubmitProduce(weldItems);
    });
  }
}

function showConfirmPopup(msg, onYes, onNo) {
  var existing = document.getElementById('confirmPopup');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'confirmPopup';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px';

      if (permission === 'granted') {

    });
  }
}

function openCheckKP(no) {
  var x = S.pendMap[no]; if (!x) return;
  var size = (S.checkKind === 'chain') ? (x.chainType || '') : (x.wtype || '');
  S.kpField = 'chk_' + no;
  S.kpVal = S.checkVals[no] ? String(S.checkVals[no]) : '';
  document.getElementById('kpLbl').textContent = size + ' В· ' + no + ' / мёЎм •мӨ‘лҹү(g)';
  document.getElementById('kpDisp').textContent = fmtKp(S.kpVal);
  document.getElementById('kpBg').classList.add('on');
  document.getElementById('kpSheet').classList.add('on');
}

function submitChecks() {
  var items = [];
  Object.keys(S.checkVals).forEach(function(no) {
    if (S.checkVals[no] > 0) items.push({no:no, checkWeight:S.checkVals[no]});
  });
  if (!items.length) { toast('вҡ пёҸ мёЎм •мӨ‘лҹүмқ„ 1к°ң мқҙмғҒ мһ…л Ҙн•ҳм„ёмҡ”', 2000, 'err'); return; }
  requirePin(function() { doSubmitChecks(items); });
}

async function doSubmitChecks(items) {
  showLoad();
  var emp = S.user ? S.user.name : 'лҜёнҷ•мқё';
  var kind = S.checkKind;
  if (DEMO) { await sleep(500); hideLoad(); toast('вң… ' + items.length + 'кұҙ нҷ•мқё (лҚ°лӘЁ)', 1800, 'ok'); loadCheck(kind); return; }
  try {
    var act = kind === 'chain' ? 'confirmChains' : 'confirmWires';
    var r = await apiPost({action:act, items:items, empName:emp});
    hideLoad();
    if (r.success) {
      var msg = 'вң… нҷңм„ұнҷ” ' + r.ok + 'кұҙ';
      if (r.bad > 0) msg += ' В· вҡ пёҸ л¶Ҳмқјм№ҳ ' + r.bad + 'кұҙ(мһ¬нҷ•мқё)';
      // кө¬кёҖ мӢңнҠём—җ л°ҳмҳҒ
      items.forEach(function(it) {
        syncToSheet(kind === 'chain' ? 'updateChainLot' : 'updateWireLot', {
          no: it.no,
          status: 'мӮ¬мҡ©к°ҖлҠҘ',
          checkWeight: it.checkWeight,
          emp: emp
        });
      });
      toast(msg, 3500, r.bad > 0 ? 'err' : 'ok');
      loadCheck(kind);
    } else toast('вқҢ ' + (r.error || 'мӢӨнҢЁ'), 2500, 'err');
  } catch(e) { hideLoad(); toast('вқҢ м—°кІ° мҳӨлҘҳ', 2500, 'err'); }
}

  if (S.kpField && S.kpField.indexOf('order_') === 0) {

    return;
  }
  if (S.kpField && S.kpField.indexOf('addrow_') === 0) {
    var rfield = S.kpField.slice(7);
    var rv = S.kpVal;
    G_NEWROW[rfield] = isNaN(parseFloat(rv)) ? rv : parseFloat(rv);

    if (rel) rel.textContent = rfield.indexOf('Wt')>=0||rfield==='wirePlan' ? fmt(G_NEWROW[rfield])+'g' : (G_NEWROW[rfield]||'-');

    return;
  }
  _origCloseKP();
};

    // м§Ғмӣҗ лЎңл“ң
    var empSnap = await getDocs(collection(window._db, 'employees'));
    var emps = []; empSnap.forEach(function(d){ emps.push({id:d.id,...d.data()}); });

    var deptList = [
      {code:'MGMT',name:'кҙҖлҰ¬л¶Җ',color:'#b71c1c'},
      {code:'MATERIAL',name:'мһҗмһ¬мӢӨ',color:'#2e7d32'},
      {code:'MACHINE',name:'кё°кі„мӢӨ',color:'#1565c0'},
      {code:'WELD',name:'мҡ©м ‘мӢӨ',color:'#bf360c'},
      {code:'QUALITY',name:'н’Ҳм§Ҳл¶Җ',color:'#6a1b9a'},
      {code:'GARANG',name:'к°Җлһ‘мӢӨ',color:'#00695c'},
      {code:'ASSEMBLY',name:'мЎ°лҰҪмӢӨ',color:'#e65100'},
      {code:'OUTSOURCE',name:'мҷёмЈј',color:'#546e7a'},
    ];

    var html = '<div class="inp-card"><div class="inp-label" style="margin-bottom:10px;font-size:19px;font-weight:800">рҹ”‘ л¶Җм„ң л№„л°ҖлІҲнҳё (4мһҗлҰ¬)</div>' +
      deptList.map(function(d){
        var pw = depts[d.code] ? depts[d.code].pw : '';
        return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0">' +
          '<div style="flex:1;font-size:20px;font-weight:800;color:' + d.color + '">' + d.name + '</div>' +
          '<input id="dpw_' + d.code + '" maxlength="4" style="width:90px;font-size:18px;font-weight:700;border:2px solid #ddd;border-radius:8px;padding:8px;text-align:center;outline:none" placeholder="0000" value="' + pw + '">' +
          '<button onclick="saveDeptPw(\'' + d.code + '\')" style="background:#1565c0;color:#fff;border:none;border-radius:8px;padding:9px 12px;font-size:17px;font-weight:700;cursor:pointer">м ҖмһҘ</button>' +
        '</div>';
      }).join('') +
    '</div>' +

    '<div class="inp-card" style="margin-top:0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
      '<div style="font-size:19px;font-weight:800">рҹ‘· мһ‘м—…мһҗ л“ұлЎқ</div>' +
      '<button onclick="openAddEmp()" style="background:#2e7d32;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:17px;font-weight:700;cursor:pointer">+ м¶”к°Җ</button>' +
    '</div>' +
    (emps.length ? emps.map(function(e){
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0">' +
        '<div style="flex:1"><div style="font-size:16px;font-weight:700">' + e.name + '</div>' +
          '<div style="font-size:16px;color:#777">PIN: ' + e.pin + ' В· ' + e.dept + '</div></div>' +
        '<button onclick="deleteEmp(\'' + e.id + '\')" style="background:#fde8e8;color:#c62828;border:none;border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer">мӮӯм ң</button>' +
      '</div>';
    }).join('') : '<div style="color:#bbb;font-size:14px">л“ұлЎқлҗң мһ‘м—…мһҗк°Җ м—ҶмҠөлӢҲлӢӨ</div>') +
    '</div>';

    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = '<div class="empty"><div class="eico">вқҢ</div><div class="etxt">лЎңл“ң мӢӨнҢЁ: ' + e.message + '</div></div>';
  }
}

async function saveDeptPw(code) {
  var pw = (document.getElementById('dpw_' + code).value||'').trim();
  if (pw.length !== 4 || isNaN(pw)) { toast('вҡ пёҸ 4мһҗлҰ¬ мҲ«мһҗлҘј мһ…л Ҙн•ҳм„ёмҡ”', 2000, 'err'); return; }
  try {
    var { doc, setDoc } = window._fbFirestore || {};
    await setDoc(doc(window._db, 'depts', code), {pw});
    toast('вң… ' + code + ' л№„л°ҖлІҲнҳё м ҖмһҘ', 1500, 'ok');
  } catch(e) { toast('вқҢ м ҖмһҘ мӢӨнҢЁ: ' + e.message, 2500, 'err'); }
}

var G_NEWEMP = {};
function openAddEmp() {
  var deptList = ['MGMT','MATERIAL','MACHINE','WELD','QUALITY','GARANG','ASSEMBLY','OUTSOURCE'];
  var s = document.getElementById('addRowSheet');
  s.innerHTML =
    '<div style="padding:18px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<div style="font-size:19px;font-weight:700">мһ‘м—…мһҗ м¶”к°Җ</div>' +
      '<button onclick="closeAddRow()" style="background:none;border:none;font-size:24px;color:#aaa;cursor:pointer">вң•</button>' +
    '</div>' +
    '<div style="display:flex;flex-direction:column;gap:12px">' +
      '<div><div style="font-size:16px;color:#888;margin-bottom:6px">мқҙлҰ„</div>' +
        '<input id="emp_name" style="width:100%;font-size:18px;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none" placeholder="нҷҚкёёлҸҷ"></div>' +
      '<div><div style="font-size:16px;color:#888;margin-bottom:6px">4мһҗлҰ¬ PIN</div>' +
        '<input id="emp_pin" type="number" maxlength="4" style="width:100%;font-size:22px;font-weight:700;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none" placeholder="1234"></div>' +
      '<div><div style="font-size:16px;color:#888;margin-bottom:6px">мҶҢмҶҚ л¶Җм„ң</div>' +
        '<select id="emp_dept" style="width:100%;font-size:18px;border:2px solid #ddd;border-radius:8px;padding:10px;outline:none">' +
          deptList.map(function(d){ return '<option value="' + d + '">' + d + '</option>'; }).join('') +
        '</select></div>' +
      '<button onclick="saveNewEmp()" style="width:100%;padding:16px;background:#2e7d32;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer">вң… л“ұлЎқ</button>' +
    '</div></div>';
  document.getElementById('addRowBg').classList.add('on');
  s.style.display = 'block';
}

async function saveNewEmp() {
  var name = (document.getElementById('emp_name').value||'').trim();
  var pin  = (document.getElementById('emp_pin').value||'').trim();
  var dept = document.getElementById('emp_dept').value;
  if (!name || pin.length !== 4) { toast('вҡ пёҸ мқҙлҰ„кіј 4мһҗлҰ¬ PINмқ„ мһ…л Ҙн•ҳм„ёмҡ”', 2000, 'err'); return; }
  try {
    var { collection, addDoc } = window._fbFirestore || {};
    await addDoc(collection(window._db, 'employees'), {name, pin, dept});
    closeAddRow();
    toast('вң… ' + name + ' л“ұлЎқ мҷ„лЈҢ', 1500, 'ok');
    loadSetupData();
  } catch(e) { toast('вқҢ л“ұлЎқ мӢӨнҢЁ: ' + e.message, 2500, 'err'); }
}

async function deleteEmp(id) {
  try {
    var { doc, deleteDoc } = window._fbFirestore || {};
    await deleteDoc(doc(window._db, 'employees', id));
    toast('рҹ—‘ мӮӯм ңлҗЁ', 1200, 'ok');
    loadSetupData();
  } catch(e) { toast('вқҢ мӮӯм ң мӢӨнҢЁ', 2000, 'err'); }
}

</script>
